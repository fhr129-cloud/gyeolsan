<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온정 F&B 결산</title>
<style>
:root{--bg:#f5f5f3;--bg2:#fff;--bg3:#fafafa;--border:#e0e0e0;--border2:#e8e8e8;--text1:#1a1a1a;--text2:#666;--text3:#999;--text4:#bbb;--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--red:#e24b4a;--amber:#BA7517;--amber-light:#FAEEDA;}
.dark{--bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;--border:#333;--border2:#2a2a2a;--text1:#f0f0f0;--text2:#aaa;--text3:#666;--text4:#444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);}
.app{max-width:720px;margin:0 auto;padding:1rem;padding-bottom:3rem;}
.header{padding:1rem 0 0.5rem;display:flex;justify-content:space-between;align-items:center;}
.header img{height:44px;object-fit:contain;}
.btn-dark{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-size:14px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;min-height:44px;}
.tab.active{color:var(--text1);border-bottom:2px solid var(--text1);font-weight:500;}
.section{display:none;}.section.active{display:block;}
select,input[type="date"],input[type="month"],input[type="text"],input[type="number"]{width:100%;height:44px;padding:0 12px;font-size:16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;appearance:none;}
select:focus,input:focus{outline:none;border-color:var(--text1);}
select:disabled{opacity:0.4;cursor:not-allowed;}
.field-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.form-group{margin-bottom:1.25rem;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border2);}
.card-title{font-size:14px;font-weight:500;color:var(--text1);}
.irow{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border2);}
.irow:last-child{border-bottom:none;}
.irow-label{font-size:13px;color:var(--text2);}
.irow-input{font-size:14px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;width:140px;text-align:right;color:var(--text1);font-family:inherit;}
.irow-input:focus{outline:none;border-color:var(--text1);background:var(--bg2);}
.irow-val{font-size:14px;font-weight:500;color:var(--text1);}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat{background:var(--bg3);border-radius:10px;padding:12px 14px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:500;color:var(--text1);}
.stat-val.g{color:var(--green);}
.stat-val.r{color:var(--red);}
.stat-val.a{color:var(--amber);}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;}
.badge-g{background:var(--green-light);color:var(--green-dark);}
.badge-a{background:var(--amber-light);color:var(--amber);}
.badge-r{background:#FCEBEB;color:#791F1F;}
.btn-primary{width:100%;padding:14px;background:var(--text1);color:var(--bg2);border:none;border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{width:100%;padding:12px;background:var(--bg2);color:var(--text1);border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:6px;}
.btn-sm{padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-sm:hover{background:var(--border);}
.btn-sm.danger{border-color:var(--red);color:var(--red);background:none;}
.week-tabs{display:flex;gap:6px;margin-bottom:12px;}
.wk{flex:1;padding:8px 4px;text-align:center;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--bg2);}
.wk-num{font-size:12px;font-weight:500;color:var(--text1);margin-bottom:2px;}
.wk-st{font-size:10px;color:var(--text3);}
.wk.done{background:var(--green-light);border-color:var(--green);}
.wk.done .wk-num{color:var(--green-dark);}
.wk.done .wk-st{color:var(--green);}
.wk.cur{background:var(--text1);border-color:var(--text1);}
.wk.cur .wk-num,.wk.cur .wk-st{color:var(--bg2);}
.progress-wrap{padding:0 16px 12px;}
.progress-track{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.3s;}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px;}
.sub-hint{font-size:12px;color:var(--text4);margin-top:5px;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text4);font-size:14px;}
.required{color:var(--red);margin-left:2px;}
/* 관리자 현황 그리드 */
.grid-wrap{overflow-x:auto;border:1px solid var(--border2);border-radius:12px;background:var(--bg2);}
table.grid{border-collapse:collapse;font-size:12px;min-width:100%;}
.grid th,.grid td{border-right:0.5px solid var(--border2);border-bottom:0.5px solid var(--border2);text-align:center;white-space:nowrap;padding:7px 10px;}
.grid th:last-child,.grid td:last-child{border-right:none;}
.grid tr:last-child td{border-bottom:none;}
th.th-site{text-align:left;position:sticky;left:0;z-index:2;background:var(--bg3);min-width:110px;font-weight:500;font-size:12px;}
td.td-site{text-align:left;position:sticky;left:0;z-index:1;background:var(--bg2);border-right:1px solid var(--border2);font-size:12px;}
th.th-h{background:var(--bg3);font-weight:500;font-size:11px;color:var(--text2);}
td.cell-o{background:#5DCAA5;color:#085041;font-weight:600;cursor:pointer;}
td.cell-o:hover{background:var(--green);}
td.cell-x{color:var(--text4);}
/* 설정 */
.settings-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.settings-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;}
.settings-head:hover{background:var(--bg3);}
.settings-name{font-size:14px;font-weight:500;color:var(--text1);}
.settings-info{font-size:12px;color:var(--text2);margin-top:2px;}
.settings-panel{display:none;padding:16px;border-top:1px solid var(--border2);}
.settings-card.open .settings-panel{display:block;}
.chevron{width:16px;height:16px;stroke:var(--text4);fill:none;stroke-width:2;transition:transform 0.2s;}
.settings-card.open .chevron{transform:rotate(180deg);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:6px 14px;font-size:13px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--bg3);color:var(--text2);}
.chip.on{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:500;}
.panel-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;margin-top:14px;}
.panel-label:first-child{margin-top:0;}
.new-site-form{background:var(--bg2);border:1.5px dashed var(--border);border-radius:12px;padding:16px;margin-top:8px;}
.new-site-title{font-size:14px;font-weight:500;color:var(--text1);margin-bottom:12px;}
/* 로딩/토스트 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.dark .loading-overlay{background:rgba(0,0,0,0.75);}
.loading-overlay.show{display:flex;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--text1);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text2);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text1);color:var(--bg2);padding:12px 22px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;}
.toast.error{background:var(--red);}
@media(max-width:480px){.two-col{grid-template-columns:1fr;}.stat-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="logo.jpg" id="logo-img" alt="온정 F&B" />
    <button class="btn-dark" onclick="toggleDark()" id="dark-btn">🌙</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('daily')">일마감</button>
    <button class="tab" onclick="switchTab('attendance')">근태</button>
    <button class="tab" onclick="switchTab('weekly')">주간현황</button>
    <button class="tab" onclick="switchTab('monthly')">월말결산</button>
    <button class="tab" onclick="switchTab('admin')">관리자</button>
    <button class="tab" onclick="switchTab('settings')">설정</button>
  </div>

  <!-- 일마감 탭 -->
  <div class="section active" id="sec-daily">
    <div class="two-col">
      <div>
        <label class="field-label">매니저 <span class="required">*</span></label>
        <select id="daily-manager" onchange="onDailyManagerChange()"><option value="">선택</option></select>
      </div>
      <div>
        <label class="field-label">날짜 <span class="required">*</span></label>
        <input type="date" id="daily-date" onchange="onDailyDateChange()" />
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">사업장 <span class="required">*</span></label>
      <select id="daily-site" disabled onchange="onDailySiteChange()"><option value="">먼저 매니저를 선택하세요</option></select>
    </div>
    <div id="daily-content"><div class="empty-state">사업장을 선택하면 입력 항목이 표시됩니다</div></div>
  </div>

  <!-- 근태 탭 -->
  <div class="section" id="sec-attendance">
    <div class="two-col">
      <div>
        <label class="field-label">매니저 <span class="required">*</span></label>
        <select id="att-manager" onchange="onAttManagerChange()"><option value="">선택</option></select>
      </div>
      <div>
        <label class="field-label">월</label>
        <input type="month" id="att-month" onchange="onAttChange()" />
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">사업장</label>
      <select id="att-site" disabled onchange="onAttChange()"><option value="">먼저 매니저를 선택하세요</option></select>
    </div>
    <div class="week-tabs" id="att-weeks"></div>
    <div id="att-content"><div class="empty-state">사업장을 선택하면 근태 입력 항목이 표시됩니다</div></div>
  </div>

  <!-- 주간현황 탭 -->
  <div class="section" id="sec-weekly">
    <div class="two-col">
      <div>
        <label class="field-label">매니저</label>
        <select id="weekly-manager" onchange="loadWeekly()"><option value="">선택</option></select>
      </div>
      <div>
        <label class="field-label">월</label>
        <input type="month" id="weekly-month" onchange="loadWeekly()" />
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">사업장</label>
      <select id="weekly-site" onchange="loadWeekly()"><option value="">선택</option></select>
    </div>
    <div id="weekly-content"><div class="empty-state">조회 조건을 선택해주세요</div></div>
  </div>

  <!-- 월말결산 탭 -->
  <div class="section" id="sec-monthly">
    <div class="two-col">
      <div>
        <label class="field-label">매니저</label>
        <select id="monthly-manager" onchange="onMonthlyManagerChange()"><option value="">선택</option></select>
      </div>
      <div>
        <label class="field-label">월</label>
        <input type="month" id="monthly-month" onchange="loadMonthly()" />
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">사업장</label>
      <select id="monthly-site" disabled onchange="loadMonthly()"><option value="">먼저 매니저를 선택하세요</option></select>
    </div>
    <div id="monthly-content"><div class="empty-state">조회 조건을 선택해주세요</div></div>
  </div>

  <!-- 관리자 탭 -->
  <div class="section" id="sec-admin">
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button onclick="setAdminQuick('yesterday')" id="adm-btn-yd" style="padding:0 18px;height:40px;font-size:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);cursor:pointer;font-family:inherit;">어제</button>
      <button onclick="setAdminQuick('today')" id="adm-btn-td" style="padding:0 18px;height:40px;font-size:14px;font-weight:500;border:1px solid var(--border);border-radius:10px;background:var(--text1);color:var(--bg2);cursor:pointer;font-family:inherit;">오늘</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:flex-end;">
      <input type="month" id="admin-month" style="width:auto;flex:1;min-width:140px;max-width:180px;" />
      <select id="admin-manager-filter" style="width:auto;flex:1;min-width:130px;max-width:180px;" onchange="loadAdmin()"><option value="">전체 매니저</option></select>
      <button onclick="loadAdmin()" style="padding:0 14px;height:44px;font-size:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);cursor:pointer;font-family:inherit;">조회</button>
      <button id="btn-excel" onclick="downloadExcel()" disabled style="padding:0 14px;height:44px;font-size:14px;font-weight:500;background:var(--green);border:none;border-radius:10px;cursor:pointer;color:white;font-family:inherit;">📊 엑셀</button>
    </div>
    <div class="grid-wrap" id="admin-grid"><div class="empty-state">조회해주세요</div></div>
  </div>

  <!-- 설정 탭 -->
  <div class="section" id="sec-settings">
    <div id="settings-lock">
      <div style="max-width:320px;margin:2rem auto;">
        <div style="font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text1);">관리자 확인</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;">설정을 변경하려면 비밀번호를 입력해주세요</div>
        <div style="display:flex;gap:8px;">
          <input type="password" id="settings-pw" placeholder="비밀번호" style="flex:1;" onkeydown="if(event.key==='Enter')checkPw()" />
          <button onclick="checkPw()" style="padding:0 16px;height:44px;background:var(--text1);color:var(--bg2);border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;">확인</button>
        </div>
        <div id="pw-error" style="font-size:12px;color:var(--red);margin-top:8px;min-height:16px;"></div>
      </div>
    </div>
    <div id="settings-content" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div style="font-size:15px;font-weight:600;color:var(--text1);">사업장 설정</div>
        <button onclick="lockSettings()" style="font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;">잠금</button>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">담당 매니저, 거래처, 경비 항목, 근무자를 설정할 수 있어요</div>
      <div id="settings-list"><div class="empty-state">불러오는 중...</div></div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="loading-text">처리 중...</div></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

async function loadConfig(){
  try{
    const snap=await getDoc(doc(db,'config','settings'));
    if(snap.exists()){
      const d=snap.data();
      if(d.managers)MANAGERS=d.managers;
      if(d.siteConfig)SITE_CONFIG=d.siteConfig;
    }
  }catch(e){console.error('설정 로드 실패',e);}
}

async function saveConfig(){
  await setDoc(doc(db,'config','settings'),{managers:MANAGERS,siteConfig:SITE_CONFIG,updatedAt:new Date().toISOString()});
}

function getSiteConfig(site){
  if(!SITE_CONFIG[site])SITE_CONFIG[site]={vendors:[],expenses:[],meals:['중식'],workers:[],manager:''};
  return SITE_CONFIG[site];
}

function getManagerForSite(site){return MANAGERS.find(m=>m.sites.includes(site));}
function getAllSites(){return MANAGERS.flatMap(m=>m.sites);}

function initDropdowns(){
  const sorted=[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  ['daily-manager','att-manager','weekly-manager','monthly-manager','admin-manager-filter'].forEach(id=>{
    const el=document.getElementById(id);
    const cur=el.value;
    el.innerHTML=id==='admin-manager-filter'?'<option value="">전체 매니저</option>':'<option value="">선택</option>';
    sorted.forEach(m=>el.appendChild(new Option(m.name,m.name)));
    if(cur)el.value=cur;
  });
  // weekly-site 전체 사업장
  const ws=document.getElementById('weekly-site');
  ws.innerHTML='<option value="">선택</option>';
  getAllSites().sort((a,b)=>a.localeCompare(b,'ko')).forEach(s=>ws.appendChild(new Option(s,s)));
}

// 매니저 선택 시 사업장 드롭다운 업데이트
function updateSiteDropdown(managerId, siteId, allowEmpty=false){
  const mgr=document.getElementById(managerId).value;
  const siteSel=document.getElementById(siteId);
  siteSel.innerHTML='';
  if(!mgr){siteSel.appendChild(new Option('먼저 매니저를 선택하세요',''));siteSel.disabled=true;return;}
  const m=MANAGERS.find(x=>x.name===mgr);
  siteSel.disabled=false;
  if(m.sites.length>1||allowEmpty)siteSel.appendChild(new Option('사업장 선택',''));
  m.sites.forEach(s=>siteSel.appendChild(new Option(s,s)));
  if(m.sites.length===1)siteSel.value=m.sites[0];
}

function renderDailyForm(site,date,data){
  const cfg=getSiteConfig(site);
  const meals=cfg.meals||['중식'];
  const vendors=cfg.vendors||[];
  let html='';

  // 끼니별 식수/식단가
  html+=`<div class="card"><div class="card-head"><span class="card-title">매출 현황</span></div>`;
  meals.forEach(meal=>{
    const mData=data.meals?.[meal]||{};
    html+=`<div class="irow"><span class="irow-label">${meal} 식수</span><input class="irow-input" type="number" id="d-count-${meal}" value="${mData.count||''}" placeholder="0" min="0"/></div>`;
    html+=`<div class="irow"><span class="irow-label">${meal} 식단가</span><input class="irow-input" type="number" id="d-price-${meal}" value="${mData.price||''}" placeholder="0" min="0"/></div>`;
  });
  html+='</div>';

  // 식재료비
  if(vendors.length>0){
    html+=`<div class="card"><div class="card-head"><span class="card-title">식재료비</span></div>`;
    vendors.forEach(v=>{
      html+=`<div class="irow"><span class="irow-label">${v}</span><input class="irow-input" type="number" id="d-vendor-${esc(v)}" value="${data.vendors?.[v]||''}" placeholder="0" min="0"/></div>`;
    });
    html+='</div>';
  }

  // 요약
  html+=`<div class="stat-grid" id="daily-stats"><div class="stat"><div class="stat-label">오늘 매출</div><div class="stat-val" id="d-total-sales">-</div></div><div class="stat"><div class="stat-label">식재료비 합계</div><div class="stat-val" id="d-total-vendor">-</div></div><div class="stat"><div class="stat-label">식재비율</div><div class="stat-val" id="d-vendor-ratio">-</div></div><div class="stat"><div class="stat-label">매출총이익</div><div class="stat-val g" id="d-gross">-</div></div></div>`;
  html+=`<button class="btn-primary" onclick="saveDailyData('${site}','${date}')">저장</button>`;

  document.getElementById('daily-content').innerHTML=html;

  // 실시간 계산
  const calcInputs=[...meals.map(m=>[`d-count-${m}`,`d-price-${m}`]).flat(),...vendors.map(v=>`d-vendor-${esc(v)}`)];
  calcInputs.forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('input',()=>updateDailySummary(meals,vendors));
  });
  updateDailySummary(meals,vendors);
}

function updateDailySummary(meals,vendors){
  let totalSales=0,totalVendor=0;
  meals.forEach(meal=>{
    const cnt=parseFloat(document.getElementById(`d-count-${meal}`)?.value)||0;
    const price=parseFloat(document.getElementById(`d-price-${meal}`)?.value)||0;
    totalSales+=cnt*price;
  });
  vendors.forEach(v=>{totalVendor+=parseFloat(document.getElementById(`d-vendor-${esc(v)}`)?.value)||0;});
  const ratio=totalSales>0?Math.round(totalVendor/totalSales*100):0;
  const gross=totalSales-totalVendor;
  document.getElementById('d-total-sales').textContent=totalSales.toLocaleString()+'원';
  document.getElementById('d-total-vendor').textContent=totalVendor.toLocaleString()+'원';
  document.getElementById('d-vendor-ratio').textContent=ratio+'%';
  document.getElementById('d-vendor-ratio').className='stat-val'+(ratio>53?' r':ratio>48?' a':' g');
  document.getElementById('d-gross').textContent=gross.toLocaleString()+'원';
}

  const cfg=getSiteConfig(site);

function getWeeksInMonth(month){
  const [y,m]=month.split('-').map(Number);
  const first=new Date(y,m-1,1),last=new Date(y,m,0);
  const weeks=[];let wStart=new Date(first);
  while(wStart<=last){
    const wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+6);
    if(wEnd>last)wEnd.setTime(last.getTime());
    weeks.push({start:wStart.toISOString().split('T')[0],end:wEnd.toISOString().split('T')[0]});
    wStart.setDate(wStart.getDate()+7);
  }
  return weeks;
}

function renderAttWeeks(){
  const month=document.getElementById('att-month').value;
  if(!month)return;
  const weeks=getWeeksInMonth(month);
  const container=document.getElementById('att-weeks');
  container.innerHTML=weeks.map((w,i)=>`
    <div class="wk${i+1===currentAttWeek?' cur':''}" onclick="selectAttWeek(${i+1})">

      <div class="wk-st">${w.start.slice(5)}~${w.end.slice(5)}</div>
    </div>`).join('');
}

window.loadWeekly=async function(){
  const site=document.getElementById('weekly-site').value;
  const month=document.getElementById('weekly-month').value;
  if(!site||!month){document.getElementById('weekly-content').innerHTML='<div class="empty-state">조회 조건을 선택해주세요</div>';return;}
  showLoading('불러오는 중...');
  try{
    const weeks=getWeeksInMonth(month);
    const cfg=getSiteConfig(site);
    let html='<div class="week-tabs">';
    const weekData=[];
    for(let i=0;i<weeks.length;i++){
      const w=weeks[i];
      const dates=getDatesInRange(w.start,w.end);
      let weekSales=0,weekVendor=0,weekPay=0;
      for(const date of dates){
        const docId=`${site}_${date}`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
        const snap=await getDoc(doc(db,'daily',docId));
        if(snap.exists()){
          const d=snap.data();
          const meals=cfg.meals||['중식'];
          meals.forEach(meal=>{const md=d.meals?.[meal]||{};weekSales+=(md.count||0)*(md.price||0);});
          Object.values(d.vendors||{}).forEach(v=>weekVendor+=v||0);
        }
      }
      const attId=`${site}_${month}_w${i+1}`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
      const attSnap=await getDoc(doc(db,'attendance',attId));
      if(attSnap.exists()){Object.values(attSnap.data().workers||{}).forEach(w=>weekPay+=w.pay||0);}
      weekData.push({week:i+1,start:w.start,end:w.end,sales:weekSales,vendor:weekVendor,pay:weekPay});
    }
    const totalSales=weekData.reduce((s,w)=>s+w.sales,0);
    const totalVendor=weekData.reduce((s,w)=>s+w.vendor,0);
    const totalPay=weekData.reduce((s,w)=>s+w.pay,0);
    const totalRatio=totalSales>0?Math.round(totalVendor/totalSales*100):0;

    html=`<div class="stat-grid">
      <div class="stat"><div class="stat-label">월 누적 매출</div><div class="stat-val">${totalSales.toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">식재비율</div><div class="stat-val ${totalRatio>53?'r':totalRatio>48?'a':'g'}">${totalRatio}%</div></div>
      <div class="stat"><div class="stat-label">인건비 합계</div><div class="stat-val">${totalPay.toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">매출총이익</div><div class="stat-val g">${(totalSales-totalVendor).toLocaleString()}</div></div>
    </div>`;
    html+=weekData.map(w=>`
      <div class="card">
        <div class="card-head">
          <span class="card-title">${w.week}주차 (${w.start.slice(5)}~${w.end.slice(5)})</span>
          <span class="badge ${w.sales>0?'badge-g':'badge-a'}">${w.sales>0?'입력됨':'미입력'}</span>
        </div>
        <div class="irow"><span class="irow-label">매출</span><span class="irow-val">${w.sales.toLocaleString()}원</span></div>

        <div class="irow"><span class="irow-label">인건비(주급)</span><span class="irow-val">${w.pay.toLocaleString()}원</span></div>

// ── 월말결산 ──
window.onMonthlyManagerChange=function(){updateSiteDropdown('monthly-manager','monthly-site');loadMonthly();};
window.loadMonthly=async function(){
  const site=document.getElementById('monthly-site').value;
  const month=document.getElementById('monthly-month').value;
  if(!site||!month){document.getElementById('monthly-content').innerHTML='<div class="empty-state">조회 조건을 선택해주세요</div>';return;}
  showLoading('결산 불러오는 중...');
  try{
    const cfg=getSiteConfig(site);
    const weeks=getWeeksInMonth(month);
    let totalSales=0,totalVendor=0,totalPay=0;
    for(const w of weeks){
      for(const date of getDatesInRange(w.start,w.end)){
        const docId=`${site}_${date}`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
        const snap=await getDoc(doc(db,'daily',docId));
        if(snap.exists()){
          const d=snap.data();
          const meals=cfg.meals||['중식'];
          meals.forEach(meal=>{const md=d.meals?.[meal]||{};totalSales+=(md.count||0)*(md.price||0);});
          Object.values(d.vendors||{}).forEach(v=>totalVendor+=v||0);
        }
      }
    }
    for(let i=0;i<weeks.length;i++){
      const attId=`${site}_${month}_w${i+1}`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
      const snap=await getDoc(doc(db,'attendance',attId));
      if(snap.exists())Object.values(snap.data().workers||{}).forEach(w=>totalPay+=w.pay||0);
    }
    // 경비 불러오기
    const expDocId=`${site}_${month}_expenses`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
    const expSnap=await getDoc(doc(db,'expenses',expDocId));
    const expData=expSnap.exists()?expSnap.data().items||{}:{};
    let totalExp=Object.values(expData).reduce((s,v)=>s+(v||0),0);
    const vendorRatio=totalSales>0?Math.round(totalVendor/totalSales*100):0;
    const payRatio=totalSales>0?Math.round(totalPay/totalSales*100):0;
    const expRatio=totalSales>0?Math.round(totalExp/totalSales*100):0;
    const opProfit=totalSales-totalVendor-totalPay-totalExp;
    const opRatio=totalSales>0?Math.round(opProfit/totalSales*100):0;
    const expenses=cfg.expenses||[];

    let html=`<div class="stat-grid">
      <div class="stat"><div class="stat-label">매출</div><div class="stat-val">${totalSales.toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">식재비율</div><div class="stat-val ${vendorRatio>53?'r':vendorRatio>48?'a':'g'}">${vendorRatio}%</div></div>
      <div class="stat"><div class="stat-label">인건비율</div><div class="stat-val ${payRatio>40?'r':''}">${payRatio}%</div></div>
      <div class="stat"><div class="stat-label">영업이익률</div><div class="stat-val ${opRatio>0?'g':'r'}">${opRatio}%</div></div>
    </div>`;
    html+=`<div class="card"><div class="card-head"><span class="card-title">자동 집계</span><span class="badge badge-g">완료</span></div>
      <div class="irow"><span class="irow-label">매출 합계</span><span class="irow-val">${totalSales.toLocaleString()}원</span></div>
      <div class="irow"><span class="irow-label">식재료비</span><span class="irow-val">${totalVendor.toLocaleString()}원</span></div>
      <div class="irow"><span class="irow-label">인건비</span><span class="irow-val">${totalPay.toLocaleString()}원</span></div>
    </div>`;
    if(expenses.length>0){
      html+=`<div class="card"><div class="card-head"><span class="card-title">경비 입력 <span style="font-size:11px;color:var(--text3);">월 1회</span></span></div>`;
      expenses.forEach(exp=>{
        html+=`<div class="irow"><span class="irow-label">${exp}</span><input class="irow-input" type="number" id="exp-${esc(exp)}" value="${expData[exp]||''}" placeholder="0" oninput="updateMonthlyTotal(${totalSales},${totalVendor},${totalPay})"/></div>`;
      });
      html+=`<div class="irow"><span class="irow-label">경비 합계</span><span class="irow-val" id="exp-total">${totalExp.toLocaleString()}원</span></div></div>`;
    }
    html+=`<div class="card"><div class="card-head"><span class="card-title">영업이익</span></div>
      <div class="irow"><span class="irow-label">영업이익</span><span class="irow-val ${opRatio>0?'g':'r'}" id="op-profit">${opProfit.toLocaleString()}원</span></div>
      <div class="irow"><span class="irow-label">영업이익률</span><span class="irow-val ${opRatio>0?'g':'r'}" id="op-ratio">${opRatio}%</span></div>
    </div>`;
    html+=`<button class="btn-primary" onclick="saveExpenses('${site}','${month}',${totalSales},${totalVendor},${totalPay})">경비 저장 및 결산 완료</button>`;
    html+=`<button class="btn-secondary" onclick="downloadMonthlyExcel('${site}','${month}',${totalSales},${totalVendor},${totalPay})">엑셀 다운로드</button>`;
    document.getElementById('monthly-content').innerHTML=html;
  }catch(e){showToast('결산 불러오기 실패: '+e.message,true);console.error(e);}
  hideLoading();
};

window.updateMonthlyTotal=function(sales,vendor,pay){
  const cfg=getSiteConfig(document.getElementById('monthly-site').value);
  const expenses=cfg.expenses||[];
  let totalExp=0;
  expenses.forEach(exp=>{totalExp+=parseFloat(document.getElementById(`exp-${esc(exp)}`)?.value)||0;});
  const op=sales-vendor-pay-totalExp;
  const opR=sales>0?Math.round(op/sales*100):0;
  const el=document.getElementById('exp-total');
  if(el)el.textContent=totalExp.toLocaleString()+'원';
  const op2=document.getElementById('op-profit');
  if(op2){op2.textContent=op.toLocaleString()+'원';op2.className='irow-val '+(opR>0?'g':'r');}
  const or2=document.getElementById('op-ratio');
  if(or2){or2.textContent=opR+'%';or2.className='irow-val '+(opR>0?'g':'r');}
};

window.saveExpenses=async function(site,month,sales,vendor,pay){
  const cfg=getSiteConfig(site);
  const expenses=cfg.expenses||[];
  const manager=document.getElementById('monthly-manager').value;
  showLoading('결산 저장 중...');
  try{
    const items={};
    let totalExp=0;
    expenses.forEach(exp=>{const v=parseFloat(document.getElementById(`exp-${esc(exp)}`)?.value)||0;items[exp]=v;totalExp+=v;});
    const op=sales-vendor-pay-totalExp;
    const docId=`${site}_${month}_expenses`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
    await setDoc(doc(db,'expenses',docId),{site,month,manager,items,totalSales:sales,totalVendor:vendor,totalPay:pay,totalExpenses:totalExp,operatingProfit:op,savedAt:new Date().toISOString()});
    showToast('결산 저장 완료!');
  }catch(e){showToast('저장 실패: '+e.message,true);}
  hideLoading();
};

window.downloadMonthlyExcel=function(site,month,sales,vendor,pay){
  const cfg=getSiteConfig(site);
  const expenses=cfg.expenses||[];
  const items={};
  let totalExp=0;
  expenses.forEach(exp=>{const v=parseFloat(document.getElementById(`exp-${esc(exp)}`)?.value)||0;items[exp]=v;totalExp+=v;});
  const op=sales-vendor-pay-totalExp;
  const opR=sales>0?Math.round(op/sales*100):0;
  const rows=[
    ['구분','금액','구성비'],
    ['매출',sales,100+'%'],
    ['식재료비',vendor,sales>0?Math.round(vendor/sales*100)+'%':'-'],
    ['인건비',pay,sales>0?Math.round(pay/sales*100)+'%':'-'],
    ['경비','',''],
    ...expenses.map(exp=>[`  ${exp}`,items[exp]||0,'']),
    ['경비 합계',totalExp,sales>0?Math.round(totalExp/sales*100)+'%':'-'],
    ['영업이익',op,opR+'%'],
  ];
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:24},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,`${month} 결산`);
  XLSX.writeFile(wb,`${site}_${month}_결산.xlsx`);
  showToast('엑셀 다운로드 완료!');
};

window.loadAdmin=async function(){
  const month=document.getElementById('admin-month').value;
  const mgrFilter=document.getElementById('admin-manager-filter').value;
  if(!month)return;
  showLoading('데이터 불러오는 중...');
  try{
    const q=query(collection(db,'expenses'),where('month','==',month));
    const snap=await getDocs(q);
    adminData=[];snap.forEach(d=>adminData.push(d.data()));
    renderAdminGrid(month,mgrFilter);

function renderAdminGrid(month,mgrFilter){
  let sites=getAllSites();
  if(mgrFilter){const m=MANAGERS.find(x=>x.name===mgrFilter);sites=m?m.sites:[];}
  const recMap={};adminData.forEach(r=>recMap[r.site]=r);
  const submitted=sites.filter(s=>recMap[s]).length;
  let html=`<div style="padding:12px 16px;font-size:13px;color:var(--text2);border-bottom:0.5px solid var(--border2);">${month} · 제출 ${submitted}/${sites.length}개 사업장</div>`;
  html+=`<table class="grid"><thead><tr>
    <th class="th-site th-h">사업장</th>
    <th class="th-h">매출</th><th class="th-h">식재비율</th><th class="th-h">인건비율</th><th class="th-h">영업이익률</th><th class="th-h">상태</th>
  </tr></thead><tbody>`;
  sites.forEach(site=>{
    const r=recMap[site];
    const mgr=getManagerForSite(site)?.name||'-';
    if(r){
      const vr=r.totalSales>0?Math.round(r.totalVendor/r.totalSales*100):0;
      const pr=r.totalSales>0?Math.round(r.totalPay/r.totalSales*100):0;
      const or=r.totalSales>0?Math.round(r.operatingProfit/r.totalSales*100):0;
      html+=`<tr>
        <td class="td-site">${site}<br><span style="font-size:10px;color:var(--text3);">${mgr}</span></td>
        <td>${r.totalSales.toLocaleString()}</td>
        <td style="color:${vr>53?'var(--red)':vr>48?'var(--amber)':'var(--green)'}">${vr}%</td>
        <td style="color:${pr>40?'var(--red)':'var(--text1)'}">${pr}%</td>
        <td style="color:${or>0?'var(--green)':'var(--red)'}">${or}%</td>
        <td><span class="badge badge-g">제출완료</span></td>
      </tr>`;
    } else {
      html+=`<tr><td class="td-site">${site}<br><span style="font-size:10px;color:var(--text3);">${mgr}</span></td><td colspan="4" style="color:var(--text4);">미제출</td><td><span class="badge badge-a">미제출</span></td></tr>`;
    }
  });
  html+='</tbody></table>';
  document.getElementById('admin-grid').innerHTML=html;
}

window.downloadExcel=function(){
  if(!adminData.length){showToast('먼저 조회해주세요',true);return;}
  const rows=[['사업장','담당 매니저','매출','식재료비','식재비율','인건비','인건비율','경비','영업이익','영업이익률']];
  adminData.sort((a,b)=>a.site.localeCompare(b.site,'ko')).forEach(r=>{
    const mgr=getManagerForSite(r.site)?.name||'-';
    const vr=r.totalSales>0?Math.round(r.totalVendor/r.totalSales*100)+'%':'-';
    const pr=r.totalSales>0?Math.round(r.totalPay/r.totalSales*100)+'%':'-';
    const or=r.totalSales>0?Math.round(r.operatingProfit/r.totalSales*100)+'%':'-';
    rows.push([r.site,mgr,r.totalSales,r.totalVendor,vr,r.totalPay,pr,r.totalExpenses||0,r.operatingProfit,or]);
  });
  // 합계행
  const ts=adminData.reduce((s,r)=>s+r.totalSales,0);
  const tv=adminData.reduce((s,r)=>s+r.totalVendor,0);
  const tp=adminData.reduce((s,r)=>s+r.totalPay,0);
  const te=adminData.reduce((s,r)=>s+(r.totalExpenses||0),0);
  const top=adminData.reduce((s,r)=>s+r.operatingProfit,0);
  rows.push(['합계','',ts,tv,ts>0?Math.round(tv/ts*100)+'%':'',tp,ts>0?Math.round(tp/ts*100)+'%':'',te,top,ts>0?Math.round(top/ts*100)+'%':'']);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:12},{wch:14},{wch:14},{wch:10},{wch:14},{wch:10},{wch:12},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'결산 취합');
  XLSX.writeFile(wb,`결산취합_${document.getElementById('admin-month').value}.xlsx`);
  showToast('엑셀 다운로드 완료!');
};

window.toggleSettingsCard=function(site){document.getElementById('sc-'+esc(site)).classList.toggle('open');};
window.toggleChip=function(el,site,field,val){
  el.classList.toggle('on');
  const cfg=getSiteConfig(site);
  if(!cfg[field])cfg[field]=[];
  if(el.classList.contains('on')){if(!cfg[field].includes(val))cfg[field].push(val);}
  else cfg[field]=cfg[field].filter(x=>x!==val);
};

window.addWorker=function(site){
  const nameEl=document.getElementById(`new-worker-name-${esc(site)}`);
  const typeEl=document.getElementById(`new-worker-type-${esc(site)}`);
  const name=nameEl.value.trim();
  if(!name){showToast('이름을 입력해주세요',true);return;}
  const cfg=getSiteConfig(site);
  if(!cfg.workers)cfg.workers=[];
  cfg.workers.push({name,type:typeEl.value});
  nameEl.value='';
  renderSettings();
  document.getElementById('sc-'+esc(site)).classList.add('open');
};

window.removeWorker=function(site,idx){
  const cfg=getSiteConfig(site);
  cfg.workers.splice(idx,1);
  renderSettings();
  document.getElementById('sc-'+esc(site)).classList.add('open');
};

window.saveSiteSettings=async function(site){
  showLoading('저장 중...');
  try{
    const selectedMgr=document.getElementById(`sc-mgr-${esc(site)}`).value;
    const newMgrInput=document.getElementById(`sc-newmgr-${esc(site)}`);
    const newMgrName=newMgrInput?newMgrInput.value.trim():'';
    const finalMgr=newMgrName||selectedMgr;
    if(newMgrName&&!MANAGERS.find(m=>m.name===newMgrName))MANAGERS.push({name:newMgrName,sites:[]});
    MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==site);});
    const mgr=MANAGERS.find(m=>m.name===finalMgr);
    if(mgr&&!mgr.sites.includes(site))mgr.sites.push(site);
    await saveConfig();
    hideLoading();showToast(`${site} 저장 완료!`);
    initDropdowns();renderSettings();
  }catch(e){hideLoading();showToast('저장 실패: '+e.message,true);}
};

window.deleteSite=async function(site){
  if(!confirm(`"${site}" 사업장을 삭제할까요?`))return;
  showLoading('삭제 중...');
  try{
    MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==site);});
    delete SITE_CONFIG[site];
    await saveConfig();
    hideLoading();showToast(`${site} 삭제 완료!`);
    initDropdowns();renderSettings();
  }catch(e){hideLoading();showToast('삭제 실패',true);}
};

window.addNewSite=async function(){
  const name=document.getElementById('new-site-name').value.trim();
  const existing=document.getElementById('new-site-manager').value;
  const newMgr=document.getElementById('new-site-new-manager').value.trim();
  const mgr=newMgr||existing;
  if(!name){showToast('사업장 이름을 입력해주세요',true);return;}
  if(getAllSites().includes(name)){showToast('이미 존재하는 사업장이에요',true);return;}
  if(!mgr){showToast('담당 매니저를 선택하거나 입력해주세요',true);return;}
  showLoading('추가 중...');
  try{
    if(newMgr&&!MANAGERS.find(m=>m.name===newMgr))MANAGERS.push({name:newMgr,sites:[]});
    SITE_CONFIG[name]={vendors:[],expenses:[],meals:['중식'],workers:[],manager:mgr};
    const m=MANAGERS.find(x=>x.name===mgr);
    if(m&&!m.sites.includes(name))m.sites.push(name);
    await saveConfig();
    hideLoading();showToast(`${name} 추가 완료!`);
    document.getElementById('new-site-name').value='';
    document.getElementById('new-site-new-manager').value='';
    document.getElementById('new-site-manager').value='';
    initDropdowns();renderSettings();
    setTimeout(()=>{const c=document.getElementById('sc-'+esc(name));if(c){c.classList.add('open');c.scrollIntoView({behavior:'smooth',block:'center'});}},200);
  }catch(e){hideLoading();showToast('추가 실패: '+e.message,true);}
};

// ── 탭 전환 ──
window.switchTab=function(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='settings')renderSettings();
};

// ── 유틸 ──
function esc(s){return s.replace(/[^a-zA-Z0-9가-힣]/g,'_');}
function getDatesInRange(from,to){const d=[],c=new Date(from),e=new Date(to);while(c<=e){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}

// 매니저 이름 기억
const savedMgr=localStorage.getItem('savedManagerGyeolsan');

// 초기화
async function init(){
  showLoading('불러오는 중...');
  await loadConfig();
  hideLoading();
  initDropdowns();
  // 저장된 매니저 자동 선택
  if(savedMgr&&MANAGERS.find(m=>m.name===savedMgr)){
    ['daily-manager','att-manager','monthly-manager'].forEach(id=>{
      document.getElementById(id).value=savedMgr;
    });
    updateSiteDropdown('daily-manager','daily-site');
    updateSiteDropdown('att-manager','att-site');
    updateSiteDropdown('monthly-manager','monthly-site');
  }
}
init();

// 매니저 선택 시 저장
document.getElementById('daily-manager').addEventListener('change',function(){
  if(this.value)localStorage.setItem('savedManagerGyeolsan',this.value);
});
</script>
