<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온정 F&B 결산</title>
<style>
/* ── 대시보드 디자인 ── */
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--bg4:#2a2f45;
  --border:#2e3347;--border2:#363c56;
  --text1:#f0f2ff;--text2:#8b92b8;--text3:#5a6080;--text4:#3a4060;
  --green:#00d4a0;--green-light:rgba(0,212,160,0.12);--green-dark:#00a87e;
  --red:#ff5c5c;--amber:#ffb340;--amber-light:rgba(255,179,64,0.12);
  --blue:#4d8fff;--blue-light:rgba(77,143,255,0.12);
  --accent:#6c63ff;--accent-light:rgba(108,99,255,0.12);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
/* 라이트모드 override */
body:not(.dark){
  --bg:#f0f2f8;--bg2:#fff;--bg3:#f5f7ff;--bg4:#eceffe;
  --border:#dde1f0;--border2:#e8ebf8;
  --text1:#12163a;--text2:#5a6080;--text3:#8b92b8;--text4:#c0c6e0;
  --green:#0a8c68;--green-light:#e0faf3;--green-dark:#076b50;
  --red:#d93636;--amber:#b87800;--amber-light:#fff4e0;
  --blue:#2563eb;--blue-light:#eff4ff;
  --accent:#5b52e8;--accent-light:#f0efff;
  --shadow:0 4px 24px rgba(80,80,160,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);transition:background 0.2s,color 0.2s;}

/* 로그인 */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--bg);}
.login-logo{height:56px;object-fit:contain;margin-bottom:2rem;}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(--text1),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:2.5rem;text-align:center;}
.btn-google{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;cursor:pointer;font-size:15px;font-weight:500;color:var(--text1);font-family:inherit;width:100%;max-width:320px;justify-content:center;box-shadow:var(--shadow);transition:transform 0.15s;}
.btn-google:hover{transform:translateY(-1px);}
.google-icon{width:20px;height:20px;}
.pending-screen,.name-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.pending-icon{width:64px;height:64px;border-radius:50%;background:var(--amber-light);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;}
.pending-title,.name-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.pending-sub,.name-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem;}
.btn-logout{padding:10px 20px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit;}
.name-select{width:100%;max-width:320px;height:48px;padding:0 14px;font-size:16px;border:1px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;margin-bottom:12px;}
.btn-confirm{width:100%;max-width:320px;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;}

/* 앱 레이아웃 */
.app{display:none;}
.app.active{display:block;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{height:30px;object-fit:contain;}
.topbar-site{font-size:15px;font-weight:700;color:var(--text1);}
.topbar-name{font-size:11px;color:var(--text2);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-icon{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.btn-icon:hover{background:var(--bg4);}
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;scrollbar-width:none;position:sticky;top:55px;z-index:99;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:13px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;transition:color 0.15s;}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent);font-weight:600;}
.tab:hover:not(.active){color:var(--text2);}
.content{padding:1.25rem;padding-bottom:4rem;}
.admin-tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;scrollbar-width:none;}
.admin-tab-bar::-webkit-scrollbar{display:none;}

/* 폼 공통 */
select,input[type="date"],input[type="month"],input[type="text"],input[type="number"],input[type="email"]{width:100%;height:44px;padding:0 12px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;appearance:none;transition:border-color 0.15s;}
select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
select:disabled{opacity:0.35;cursor:not-allowed;}
.field-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}

/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);}
.card-title{font-size:14px;font-weight:600;color:var(--text1);}
.irow{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:0.5px solid var(--border);}
.irow:last-child{border-bottom:none;}
.irow-label{font-size:13px;color:var(--text2);}
.irow-val{font-size:15px;font-weight:600;color:var(--text1);}
.irow-input{width:130px;height:38px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;text-align:right;background:var(--bg3);color:var(--text1);font-family:inherit;}
.irow-input:focus{outline:none;border-color:var(--accent);}

/* 스탯 카드 */
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.stat-val{font-size:22px;font-weight:700;color:var(--text1);line-height:1;}
.stat-val.g{color:var(--green);}
.stat-val.r{color:var(--red);}
.stat-val.a{color:var(--amber);}

/* 배지 */
.badge{font-size:11px;padding:4px 10px;border-radius:99px;font-weight:600;letter-spacing:0.02em;}
.badge-g{background:var(--green-light);color:var(--green);}
.badge-a{background:var(--amber-light);color:var(--amber);}
.badge-r{background:rgba(255,92,92,0.12);color:var(--red);}
.badge-gray{background:var(--bg4);color:var(--text3);}

/* 버튼 */
.btn-primary{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:10px;transition:opacity 0.15s,transform 0.15s;letter-spacing:0.02em;}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}
.btn-secondary{width:100%;padding:13px;background:var(--bg3);color:var(--text1);border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;transition:background 0.15s;}
.btn-secondary:hover{background:var(--bg4);}
.btn-sm{padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-sm:hover{background:var(--bg4);}
.btn-sm.danger{border-color:rgba(255,92,92,0.4);color:var(--red);background:rgba(255,92,92,0.06);}
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--text3);font-size:14px;}
.section{display:none;}.section.active{display:block;}

/* 주간 탭 */
.week-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.wk{flex:1;min-width:64px;padding:10px 6px;text-align:center;border-radius:12px;border:1px solid var(--border);cursor:pointer;background:var(--bg2);transition:all 0.15s;}
.wk:hover{border-color:var(--border2);background:var(--bg3);}
.wk-num{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text1);}
.wk-st{font-size:10px;color:var(--text3);}
.wk.cur{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 12px var(--accent-light);}
.wk.cur .wk-num,.wk.cur .wk-st{color:#fff;}
.wk.done{background:var(--green-light);border-color:var(--green);}
.wk.done .wk-num{color:var(--green);}
.wk.done .wk-st{color:var(--green-dark);}

/* 일마감 요약 카드 */
.dt-sum{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.dt-sc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.dt-sc.sales::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);}
.dt-sc.vendor::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--amber);}
.dt-sc.ratio::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.dt-sc.profit::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green);}
.dt-sl{font-size:10px;color:var(--text2);margin-bottom:8px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.dt-sv{font-size:20px;font-weight:700;color:var(--text1);line-height:1;}
.dt-sv.g{color:var(--green);}
.dt-sv.r{color:var(--red);}
.dt-sv.a{color:var(--amber);}

/* 일마감 테이블 */
.dt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:14px;background:var(--bg2);margin-bottom:14px;box-shadow:var(--shadow);}
.dt{border-collapse:collapse;font-size:12px;}
.dt th,.dt td{border:0.5px solid var(--border);white-space:nowrap;padding:0;}
.dt th{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:600;padding:8px 10px;text-align:center;letter-spacing:0.02em;}
.dt th.dt-lh{text-align:left;padding:8px 14px;position:sticky;left:0;z-index:3;background:var(--bg3);min-width:120px;}
.dt td.dt-rl{position:sticky;left:0;z-index:2;background:var(--bg2);font-size:12px;color:var(--text2);padding:4px 14px;border-right:1px solid var(--border2);min-width:120px;}
.dt td.dt-rl.sh{background:var(--bg3);font-weight:700;color:var(--text1);font-size:11px;letter-spacing:0.03em;}
.dt td.dt-rl.in1{padding-left:20px;color:var(--text1);}
.dt td.dt-rl.in2{padding-left:30px;}
.dt-inp{width:72px;height:30px;border:none;background:transparent;font-size:12px;text-align:right;padding:0 8px;color:var(--text1);font-family:inherit;display:block;}
.dt-inp:focus{outline:none;background:var(--accent-light);border-radius:4px;}
.dt-inp::-webkit-inner-spin-button,.dt-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
.dt-auto{font-size:12px;font-weight:600;padding:4px 8px;text-align:right;display:block;min-width:72px;color:var(--text1);}
.dt-ratio{font-size:12px;font-weight:600;padding:4px 8px;text-align:center;display:block;}
.dt td.dt-today{background:var(--green-light);}
.dt th.dt-today{background:rgba(0,212,160,0.2);color:var(--green);}
.dt th.dt-sun{color:var(--red);}
.dt th.dt-sat{color:var(--blue);}
.dt tr.dt-sr td,.dt tr.dt-sr th{background:var(--bg3);}
.dt tr.dt-sr td.dt-rl{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em;}

/* 노트 버튼 */
.dt-note-btn{position:absolute;top:2px;right:2px;width:0;height:0;border-style:solid;border-width:0 9px 9px 0;border-color:transparent var(--border2) transparent transparent;cursor:pointer;background:transparent;border-top:none;border-left:none;padding:0;display:block;}
.dt-note-btn.has-note{border-right-color:var(--red);}

/* 노트 모달 */
.note-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.note-modal.open{display:flex;}
.note-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.note-box-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text1);}
.note-textarea{width:100%;height:110px;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text1);resize:none;transition:border-color 0.15s;}
.note-textarea:focus{outline:none;border-color:var(--accent);}
.note-btns{display:flex;gap:10px;margin-top:12px;}
.note-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}

/* 설정 카드 */
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.settings-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;cursor:pointer;transition:background 0.15s;}
.settings-head:hover{background:var(--bg3);}
.settings-name{font-size:14px;font-weight:600;color:var(--text1);}
.settings-info{font-size:12px;color:var(--text2);margin-top:3px;}
.settings-panel{display:none;padding:18px;border-top:1px solid var(--border);}
.settings-card.open .settings-panel{display:block;}
.chevron{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform 0.2s;}
.settings-card.open .chevron{transform:rotate(180deg);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:7px 14px;font-size:13px;border:1px solid var(--border);border-radius:99px;cursor:pointer;background:var(--bg3);color:var(--text2);font-weight:500;transition:all 0.15s;}
.chip:hover{border-color:var(--border2);}
.chip.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600;}
.panel-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;margin-top:18px;letter-spacing:0.05em;text-transform:uppercase;}
.panel-label:first-child{margin-top:0;}

/* 경비 */
.exp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;}
.exp-row select{height:40px;font-size:13px;flex:0 0 130px;}
.exp-row input[type="text"]{height:40px;font-size:13px;flex:1;}
.exp-row input[type="number"]{height:40px;font-size:13px;flex:0 0 100px;text-align:right;}
.exp-row button{flex-shrink:0;height:36px;}

/* 유저 카드 */
.user-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:600;color:var(--text1);}
.user-email{font-size:12px;color:var(--text2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-site{font-size:12px;color:var(--text3);margin-top:2px;}
.user-actions{display:flex;gap:6px;flex-shrink:0;}

/* 로딩/토스트 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(15,17,23,0.8);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(4px);}
body:not(.dark) .loading-overlay{background:rgba(240,242,248,0.85);}
.loading-overlay.show{display:flex;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text2);font-weight:500;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text1);border:1px solid var(--border);padding:13px 24px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.toast.show{opacity:1;}
.toast.error{background:var(--red);color:#fff;border-color:var(--red);}
/* 월별 달력 */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-title{font-size:15px;font-weight:700;color:var(--text1);}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:6px 0;letter-spacing:0.04em;}
.cal-dow.sun{color:var(--red);}
.cal-dow.sat{color:var(--blue);}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;min-height:72px;cursor:pointer;transition:all 0.15s;position:relative;}
.cal-day:hover{border-color:var(--accent);background:var(--accent-light);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.cal-day.has-data{background:var(--bg3);}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text1);margin-bottom:4px;}
.cal-day.sun .cal-day-num{color:var(--red);}
.cal-day.sat .cal-day-num{color:var(--blue);}
.cal-day-sales{font-size:11px;font-weight:700;color:var(--text1);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-day-ratio{font-size:10px;font-weight:600;margin-top:3px;padding:2px 5px;border-radius:4px;display:inline-block;}
.cal-day-ratio.g{background:var(--green-light);color:var(--green);}
.cal-day-ratio.a{background:var(--amber-light);color:var(--amber);}
.cal-day-ratio.r{background:rgba(255,92,92,0.12);color:var(--red);}
.cal-legend{display:flex;gap:12px;font-size:11px;color:var(--text2);margin-bottom:12px;flex-wrap:wrap;}
.cal-legend-item{display:flex;align-items:center;gap:4px;}
.cal-legend-dot{width:8px;height:8px;border-radius:2px;}
@media(max-width:480px){.cal-day{min-height:58px;padding:6px 4px;}.cal-day-sales{font-size:10px;}.cal-grid{gap:3px;}}
</style>
</head>
<body>

<div id="screen-login" style="display:none;">
  <div class="login-screen">
    <img src="logo.jpg" class="login-logo" id="login-logo" alt="온정 F&B" />
    <div class="login-title">온정 F&B 결산 시스템</div>

const firebaseConfig={apiKey:"AIzaSyAy8kfupnp_FPHxehNGndKKddO0iX2Ogz4",authDomain:"gyeolsan-e310a.firebaseapp.com",projectId:"gyeolsan-e310a",storageBucket:"gyeolsan-e310a.firebasestorage.app",messagingSenderId:"769034994764",appId:"1:769034994764:web:49dba993c030bead8fa0e9"};

let isDark=localStorage.getItem('dark')==='1';
function applyDark(){

function showLoading(msg){document.getElementById('loading-text').textContent=msg||'처리 중...';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
function showToast(msg,isError){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function esc(s){return s.replace(/[^a-zA-Z0-9가-힣]/g,'_');}
function fmtNum(n){return n?n.toLocaleString():'';}
function getDates(from,to){const d=[],c=new Date(from),e=new Date(to);while(c<=e){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}
function getDaysInMonth(month){const[y,m]=month.split('-').map(Number);const last=new Date(y,m,0).getDate();return getDates(`${month}-01`,`${month}-${String(last).padStart(2,'0')}`);}
function getWeeks(month){const dates=getDaysInMonth(month);const weeks=[];let w=[];dates.forEach(d=>{w.push(d);if(new Date(d).getDay()===0||d===dates[dates.length-1]){weeks.push([...w]);w=[];}});if(w.length)weeks.push(w);return weeks;}
function getSiteConfig(site){if(!SITE_CONFIG[site])SITE_CONFIG[site]={meals:['중식'],prices:{},extraVendors:[],expenses:[],workers:[]};return SITE_CONFIG[site];}
function getVendors(site){const cfg=getSiteConfig(site);return [...DEFAULT_VENDORS,...(cfg.extraVendors||[])];}
function getAllSites(){return MANAGERS.flatMap(m=>m.sites);}
function getManagerForSite(site){return MANAGERS.find(m=>m.sites.includes(site));}
function ratioStyle(r){return r>53?'color:var(--red)':r>48?'color:var(--amber)':'color:var(--green)';}

async function loadConfig(){
  try{const snap=await getDoc(doc(db,'config','settings'));if(snap.exists()){const d=snap.data();if(d.managers)MANAGERS=d.managers;if(d.siteConfig)SITE_CONFIG=d.siteConfig;}}catch(e){console.error(e);}
}

  if(!name){showToast('매니저를 선택해주세요',true);return;}
  const mgr=MANAGERS.find(m=>m.name===name);
  currentUserData={name,sites:mgr?mgr.sites:[],status:'approved',role:'manager'};
  showManagerApp(currentUserData);
};

// config 미리 로드 (테스트 드롭다운용)
(async()=>{
  await loadConfig();
  const tsel=document.getElementById('test-mgr-sel');
  if(tsel){tsel.innerHTML='<option value="">매니저 선택 (테스트용)</option>';[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>tsel.appendChild(new Option(m.name,m.name)));}
})();

onAuthStateChanged(auth,async user=>{
  currentUser=user;
  if(!user){
    showScreen('login');
    const tsel=document.getElementById('test-mgr-sel');
    if(tsel&&MANAGERS.length){tsel.innerHTML='<option value="">매니저 선택 (테스트용)</option>';[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>tsel.appendChild(new Option(m.name,m.name)));}
    hideLoading();return;
  }
  showLoading('불러오는 중...');
  await loadConfig();
  if(ADMIN_EMAILS.includes(user.email)){currentUserData={role:'admin',email:user.email};showAdminApp();hideLoading();return;}
  const userSnap=await getDoc(doc(db,'users',user.uid));
  if(!userSnap.exists()){
    showScreen('name');
    const sel=document.getElementById('name-select');sel.innerHTML='<option value="">매니저 이름 선택</option>';
    [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>sel.appendChild(new Option(m.name,m.name)));
    hideLoading();return;
  }
  const ud=userSnap.data();currentUserData=ud;
  if(ud.status==='pending'){showScreen('pending');hideLoading();return;}
  if(ud.status==='approved'){showManagerApp(ud);hideLoading();return;}
  hideLoading();
});

window.submitName=async function(){
  const name=document.getElementById('name-select').value;
  if(!name){showToast('이름을 선택해주세요',true);return;}
  showLoading('신청 중...');
  try{
    const mgr=MANAGERS.find(m=>m.name===name);
    await setDoc(doc(db,'users',currentUser.uid),{uid:currentUser.uid,email:currentUser.email,name,sites:mgr?mgr.sites:[],status:'pending',role:'manager',createdAt:new Date().toISOString()});

  }catch(e){hideLoading();showToast('오류: '+e.message,true);}

function showScreen(name){
  ['screen-login','screen-name','screen-pending'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('app-manager').classList.remove('active');
  document.getElementById('app-admin').classList.remove('active');
  if(name==='login')document.getElementById('screen-login').style.display='block';
  else if(name==='name')document.getElementById('screen-name').style.display='block';
  else if(name==='pending')document.getElementById('screen-pending').style.display='block';
}

// 공유 사업장/월 상태
let sharedSite='';
let sharedMonth=thisMonth;

function syncSelects(){
  ['mgr-daily-site','mgr-att-site','mgr-weekly-site','mgr-monthly-site'].forEach(id=>{
    const el=document.getElementById(id);if(el&&sharedSite)el.value=sharedSite;
  });
  ['mgr-daily-month','mgr-att-month','mgr-weekly-month','mgr-monthly-month'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value=sharedMonth;
  });
}

function showManagerApp(ud){
  showScreen('');document.getElementById('app-manager').classList.add('active');
  const sites=ud.sites||[];
  document.getElementById('topbar-site').textContent=sites.length===1?sites[0]:sites.join(', ');
  document.getElementById('topbar-name').textContent=ud.name;
  ['mgr-daily-site','mgr-att-site','mgr-weekly-site','mgr-monthly-site'].forEach(id=>{
    const el=document.getElementById(id);el.innerHTML='<option value="">선택</option>';
    sites.forEach(s=>el.appendChild(new Option(s,s)));
  });
  if(sites.length===1)sharedSite=sites[0];
  syncSelects();
  if(sharedSite){initDailyWeekTabs();loadDailyTable();loadAttendance();loadWeekly();loadMonthly();}
}

window.switchManagerTab=function(tab){
  // 현재 선택값 저장
  const siteEl=document.getElementById(`mgr-${tab==='myconfig'?'daily':tab}-site`);
  const monthEl=document.getElementById(`mgr-${tab==='myconfig'?'daily':tab}-month`);
  if(siteEl&&siteEl.value)sharedSite=siteEl.value;
  if(monthEl&&monthEl.value)sharedMonth=monthEl.value;

  document.querySelectorAll('#app-manager .tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`#app-manager .tab[onclick="switchManagerTab('${tab}')"]`).classList.add('active');
  document.querySelectorAll('#app-manager .section').forEach(s=>s.classList.remove('active'));
  document.getElementById('mgr-'+tab).classList.add('active');

  // 선택값 복원 후 로드
  syncSelects();
  if(tab==='daily'){initDailyWeekTabs();loadDailyTable();}
  else if(tab==='attendance')loadAttendance();
  else if(tab==='weekly')loadWeekly();
  else if(tab==='monthly')loadMonthly();
  else if(tab==='myconfig')renderMyConfig();
};

}

async function loadApproval(){
  try{
    const snap=await getDocs(query(collection(db,'users')));
    const users=[];snap.forEach(d=>users.push(d.data()));
    const pending=users.filter(u=>u.status==='pending');
    const approved=users.filter(u=>u.status==='approved');
    let html='';
    if(pending.length){html+=`<div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;">승인 대기 (${pending.length}명)</div>`;html+=pending.map(u=>`<div class="user-card"><div class="user-info"><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div><div class="user-site">${(u.sites||[]).join(', ')||'사업장 없음'}</div></div><div class="user-actions"><button class="btn-sm" style="background:var(--green-light);color:var(--green-dark);border-color:var(--green);" onclick="approveUser('${u.uid}')">승인</button><button class="btn-sm danger" onclick="rejectUser('${u.uid}')">거절</button></div></div>`).join('');}
    if(approved.length){html+=`<div style="font-size:13px;font-weight:500;color:var(--text2);margin:16px 0 8px;">승인된 계정 (${approved.length}명)</div>`;html+=approved.map(u=>`<div class="user-card"><div class="user-info"><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div><div class="user-site">${(u.sites||[]).join(', ')||'사업장 없음'}</div></div><div class="user-actions"><button class="btn-sm danger" onclick="revokeUser('${u.uid}')">취소</button></div></div>`).join('');}
    if(!pending.length&&!approved.length)html='<div class="empty-state">등록된 계정이 없어요</div>';
    document.getElementById('approval-list').innerHTML=html;
  }catch(e){showToast('불러오기 실패',true);}
}

window.loadDailyTable=async function(){
  const site=document.getElementById('mgr-daily-site').value;
  const month=document.getElementById('mgr-daily-month').value;
  const wrap=document.getElementById('daily-table-wrap');
  if(!site||!month){wrap.innerHTML='<div class="empty-state">사업장과 월을 선택해주세요</div>';return;}
  showLoading('불러오는 중...');
  try{
    const cfg=getSiteConfig(site);
    const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
    const vendors=getVendors(site);
    const weeks=getWeeks(month);
    const weekDates=weeks[currentDailyWeek-1]||weeks[0];
    const savedData={};weekNotes={};
    for(const date of weekDates){
      const snap=await getDoc(doc(db,'daily',`${esc(site)}_${date}`));
      if(snap.exists()){savedData[date]=snap.data();const notes=snap.data().notes||{};Object.assign(weekNotes,Object.fromEntries(Object.entries(notes).map(([k,v])=>[`${date}_${k}`,v])));}
    }
    renderDailyTable(site,month,meals,vendors,weekDates,savedData,cfg.prices||{});
  }catch(e){showToast('불러오기 실패: '+e.message,true);console.error(e);}
  hideLoading();
};

function renderDailyTable(site,month,meals,vendors,dates,savedData,prices){
  const wrap=document.getElementById('daily-table-wrap');

  const sumHtml=`<div class="dt-sum">
    <div class="dt-sc sales"><div class="dt-sl">이번 주 매출</div><div class="dt-sv" id="dsum-sales">-</div></div>
    <div class="dt-sc vendor"><div class="dt-sl">식재료비</div><div class="dt-sv" id="dsum-vendor">-</div></div>
    <div class="dt-sc ratio"><div class="dt-sl">식재비율</div><div class="dt-sv" id="dsum-ratio">-</div></div>
    <div class="dt-sc profit"><div class="dt-sl">매출총이익</div><div class="dt-sv g" id="dsum-profit">-</div></div>
  </div>`;

  function todayCls(d){return d===todayKST?' dt-today':'';}
  function thCls(d){const day=new Date(d).getDay();return d===todayKST?'dt-today':day===0?'dt-sun':day===6?'dt-sat':'';}

  let thead=`<thead><tr><th class="dt-lh">항목</th>`;
  dates.forEach(d=>{const day=new Date(d).getDay();thead+=`<th class="${thCls(d)}">${d.slice(5)}<br><span style="font-weight:400;">(${DAYS[day]})</span></th>`;});
  thead+=`<th>합계</th></tr></thead>`;

  function inputTd(date,field,defaultVal=''){
    let val='';const prev=savedData[date];
    if(prev){
      if(field.startsWith('cnt_'))val=prev.meals?.[field.replace('cnt_','')]?.count||'';
      else if(field.startsWith('price_'))val=prev.meals?.[field.replace('price_','')]?.price||defaultVal;
      else if(field.startsWith('v_'))val=prev.vendors?.[field.replace('v_','')]||'';
    } else if(field.startsWith('price_')&&defaultVal){val=defaultVal;}
    return `<td class="${todayCls(date)}"><input class="dt-inp" type="number" data-date="${date}" data-field="${field}" value="${val||''}" min="0" oninput="recalcDaily()"/></td>`;
  }
  function autoTd(id,date,style=''){return `<td class="${todayCls(date)}"><span class="dt-auto" id="${id}" style="${style}"></span></td>`;}
  function ratioTd(id,date){return `<td class="${todayCls(date)}"><span class="dt-ratio" id="${id}"></span></td>`;}
  function sectionRow(label){return `<tr class="dt-sr"><td class="dt-rl sh">${label}</td>${dates.map(d=>`<td class="${todayCls(d)}"></td>`).join('')}<td></td></tr>`;}
  function noteTd(date,vendor){
    const key=`${date}_${vendor}`;
    const hasNote=!!(weekNotes[key]&&weekNotes[key].trim());
    return `<td class="${todayCls(date)}" style="padding:0;position:relative;">
      <input class="dt-inp" type="number" data-date="${date}" data-field="v_${vendor}" value="${(savedData[date]?.vendors?.[vendor])||''}" min="0" oninput="recalcDaily()" style="width:calc(100% - 10px);"/>
      <button class="dt-note-btn${hasNote?' has-note':''}" id="nb-${esc(date)}-${esc(vendor)}" onclick="openNoteModal('${date}','${vendor}')" title="메모"></button>
    </td>`;
  }

  let tbody='<tbody>';

  // ── 끼니별 매출 섹션 ──
  meals.forEach(meal=>{
    tbody+=sectionRow(`■ ${meal}`);
    tbody+=`<tr><td class="dt-rl in1">식수</td>`;
    dates.forEach(d=>tbody+=inputTd(d,`cnt_${meal}`));
    tbody+=`<td><span class="dt-auto" id="tot-cnt-${meal}"></span></td></tr>`;

    tbody+=`<tr><td class="dt-rl in2">식단가</td>`;
    dates.forEach(d=>tbody+=inputTd(d,`price_${meal}`,prices[meal]||''));
    tbody+=`<td></td></tr>`;

    tbody+=`<tr><td class="dt-rl in2" style="font-weight:500;">매출</td>`;
    dates.forEach(d=>tbody+=autoTd(`sales-${meal}-${d}`,d,'font-weight:500;'));
    tbody+=`<td><span class="dt-auto" id="tot-sales-${meal}" style="font-weight:500;"></span></td></tr>`;
  });

  // ── 총 매출 합계 ──
  tbody+=`<tr class="dt-sr"><td class="dt-rl sh">■ 매출 합계</td>`;
  dates.forEach(d=>tbody+=autoTd(`sales-total-${d}`,d,'font-weight:500;'));
  tbody+=`<td><span class="dt-auto" id="tot-sales-all" style="font-weight:500;"></span></td></tr>`;

  // ── 식재료비 섹션 ──
  tbody+=sectionRow('■ 식재료비');
  vendors.forEach(v=>{
    tbody+=`<tr><td class="dt-rl in2">${v}</td>`;
    dates.forEach(d=>tbody+=noteTd(d,v));
    tbody+=`<td><span class="dt-auto" id="tot-v-${esc(v)}"></span></td></tr>`;
  });
  tbody+=`<tr><td class="dt-rl in1" style="font-weight:500;">재료비 계</td>`;
  dates.forEach(d=>tbody+=autoTd(`vendor-${d}`,d,'font-weight:500;'));
  tbody+=`<td><span class="dt-auto" id="tot-vendor" style="font-weight:500;"></span></td></tr>`;

  tbody+=`<tr><td class="dt-rl in2">식재비율</td>`;
  dates.forEach(d=>tbody+=ratioTd(`ratio-${d}`,d));
  tbody+=`<td><span class="dt-ratio" id="tot-ratio"></span></td></tr>`;

  tbody+=`<tr><td class="dt-rl in1" style="font-weight:500;">매출총이익</td>`;
  dates.forEach(d=>tbody+=autoTd(`profit-${d}`,d));
  tbody+=`<td><span class="dt-auto" id="tot-profit" style="font-weight:500;"></span></td></tr>`;

  tbody+='</tbody>';

  wrap.innerHTML=`${sumHtml}<div class="dt-wrap"><table class="dt">${thead}${tbody}</table></div><button class="btn-primary" onclick="saveDailyAll('${site}','${month}')">이 주차 저장</button>`;
  wrap.querySelector('.dt').addEventListener('input',recalcDaily);
  recalcDaily();
}

window.recalcDaily=function(){
  const site=document.getElementById('mgr-daily-site').value;
  const month=document.getElementById('mgr-daily-month').value;
  if(!site||!month)return;
  const cfg=getSiteConfig(site);
  const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
  const vendors=getVendors(site);
  const weeks=getWeeks(month);
  const dates=weeks[currentDailyWeek-1]||weeks[0];

  function gv(date,field){const el=document.querySelector(`[data-date="${date}"][data-field="${field}"]`);return el?parseFloat(el.value)||0:0;}
  function st(id,val,style){const el=document.getElementById(id);if(!el)return;el.textContent=val;if(style!==undefined)el.style.cssText=style;}

  let tSalesAll=0,tVendor=0;
  const vendorTotals={};vendors.forEach(v=>vendorTotals[v]=0);
  const mealSalesTotals={};meals.forEach(m=>mealSalesTotals[m]=0);
  const mealCntTotals={};meals.forEach(m=>mealCntTotals[m]=0);

  dates.forEach(d=>{
    let dayTotalSales=0,dayVendor=0;
    meals.forEach(m=>{
      const cnt=gv(d,`cnt_${m}`),price=gv(d,`price_${m}`);
      const mealSales=cnt*price;
      mealSalesTotals[m]+=mealSales;mealCntTotals[m]+=cnt;dayTotalSales+=mealSales;
      st(`sales-${m}-${d}`,mealSales?fmtNum(mealSales):'');
    });
    vendors.forEach(v=>{const amt=gv(d,`v_${v}`);dayVendor+=amt;vendorTotals[v]+=amt;});
    tSalesAll+=dayTotalSales;tVendor+=dayVendor;
    st(`sales-total-${d}`,dayTotalSales?fmtNum(dayTotalSales):'','font-weight:500;');
    st(`vendor-${d}`,dayVendor?fmtNum(dayVendor):'','font-weight:500;');
    const p=dayTotalSales-dayVendor;
    st(`profit-${d}`,dayTotalSales?fmtNum(p):'',`${p<0?'color:var(--red)':p>0?'color:var(--green)':''}`);
    const r=dayTotalSales>0?Math.round(dayVendor/dayTotalSales*100):null;
    st(`ratio-${d}`,r!==null?r+'%':'',r!==null?ratioStyle(r):'');
  });

  meals.forEach(m=>{
    st(`tot-cnt-${m}`,mealCntTotals[m]?fmtNum(mealCntTotals[m]):'');
    st(`tot-sales-${m}`,mealSalesTotals[m]?fmtNum(mealSalesTotals[m]):'','font-weight:500;');
  });
  vendors.forEach(v=>st(`tot-v-${esc(v)}`,vendorTotals[v]?fmtNum(vendorTotals[v]):''));
  st('tot-sales-all',tSalesAll?fmtNum(tSalesAll):'','font-weight:500;');
  st('tot-vendor',tVendor?fmtNum(tVendor):'','font-weight:500;');
  const tp=tSalesAll-tVendor;
  st('tot-profit',tSalesAll?fmtNum(tp):'',`font-weight:500;${tp<0?'color:var(--red)':tp>0?'color:var(--green)':''}`);
  const tr=tSalesAll>0?Math.round(tVendor/tSalesAll*100):null;
  st('tot-ratio',tr!==null?tr+'%':'',tr!==null?ratioStyle(tr):'');

  const ds=document.getElementById('dsum-sales');if(ds)ds.textContent=tSalesAll?fmtNum(tSalesAll)+'원':'-';
  const dv=document.getElementById('dsum-vendor');if(dv)dv.textContent=tVendor?fmtNum(tVendor)+'원':'-';
  const dr=document.getElementById('dsum-ratio');if(dr){dr.textContent=tr!==null?tr+'%':'-';dr.className='dt-sv'+(tr!==null?(tr>53?' r':tr>48?' a':' g'):'');}
  const dp=document.getElementById('dsum-profit');if(dp){dp.textContent=tSalesAll?fmtNum(tp)+'원':'-';dp.className='dt-sv'+(tp<0?' r':' g');}
};

window.saveDailyAll=async function(site,month){
  showLoading('저장 중...');
  try{
    const cfg=getSiteConfig(site);
    const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
    const vendors=getVendors(site);
    const weeks=getWeeks(month);
    const dates=weeks[currentDailyWeek-1]||weeks[0];
    const manager=currentUserData?.name||'';
    let saved=0;
    for(const date of dates){
      const mealsData={};let hasData=false;
      meals.forEach(m=>{
        const cnt=parseFloat(document.querySelector(`[data-date="${date}"][data-field="cnt_${m}"]`)?.value)||0;
        const price=parseFloat(document.querySelector(`[data-date="${date}"][data-field="price_${m}"]`)?.value)||0;
        mealsData[m]={count:cnt,price};if(cnt||price)hasData=true;
      });
      const vendorsData={};const notesData={};
      vendors.forEach(v=>{
        const amt=parseFloat(document.querySelector(`[data-date="${date}"][data-field="v_${v}"]`)?.value)||0;
        vendorsData[v]=amt;if(amt)hasData=true;
        const noteKey=`${date}_${v}`;
        if(weekNotes[noteKey])notesData[v]=weekNotes[noteKey];
      });
      if(hasData||Object.keys(notesData).length){
        await setDoc(doc(db,'daily',`${esc(site)}_${date}`),{site,date,month,manager,meals:mealsData,vendors:vendorsData,notes:notesData,savedAt:new Date().toISOString()});
        saved++;
      }
    }
    // 식단가 자동저장 (처음 입력한 경우)
    const priceUpdate={};
    meals.forEach(m=>{
      const firstDate=dates[0];
      const price=parseFloat(document.querySelector(`[data-date="${firstDate}"][data-field="price_${m}"]`)?.value)||0;
      if(price&&!cfg.prices?.[m])priceUpdate[m]=price;
    });
    if(Object.keys(priceUpdate).length){
      if(!cfg.prices)cfg.prices={};Object.assign(cfg.prices,priceUpdate);await saveConfig();}
    showToast(`${saved}일 저장 완료!`);
  }catch(e){showToast('저장 실패: '+e.message,true);console.error(e);}
  hideLoading();
};

async function loadAttData(site,month){

function renderAttForm(site,month,workers,data){

    </div>`;
  });
  const totalPay=workers.reduce((s,w)=>s+(parseFloat(data.workers?.[w.name]?.pay)||0),0);
  html+=`<div class="stat-grid">
    <div class="stat"><div class="stat-label">고용직</div><div class="stat-val">${workers.filter(w=>w.type==='고용직').length}명</div></div>
    <div class="stat"><div class="stat-label">일용직</div><div class="stat-val">${workers.filter(w=>w.type==='일용직').length}명</div></div>
    <div class="stat" style="grid-column:span 2;"><div class="stat-label">주급 합계</div><div class="stat-val">${totalPay.toLocaleString()}원</div></div>
  </div><button class="btn-primary" onclick="saveAttData('${site}','${month}')">저장</button>`;
  document.getElementById('att-content').innerHTML=html;
}
window.saveAttData=async function(site,month){
  const cfg=getSiteConfig(site);const workers=cfg.workers||[];const manager=currentUserData?.name||'';
  showLoading('저장 중...');
  try{
    const workersData={};
    workers.forEach(w=>{workersData[w.name]={type:w.type,hours:parseFloat(document.getElementById(`att-hrs-${esc(w.name)}`)?.value)||0,extHours:parseFloat(document.getElementById(`att-ext-${esc(w.name)}`)?.value)||0,pay:parseFloat(document.getElementById(`att-pay-${esc(w.name)}`)?.value)||0};});
    await setDoc(doc(db,'attendance',`${esc(site)}_${month}_w${currentAttWeek}`),{site,month,week:currentAttWeek,manager,workers:workersData,savedAt:new Date().toISOString()});
    showToast(`${currentAttWeek}주차 근태 저장 완료!`);
  }catch(e){showToast('저장 실패: '+e.message,true);}hideLoading();

window.saveExpenses=async function(site,month,sales,vendor,pay){

    showToast('결산 제출 완료!');
  }catch(e){showToast('저장 실패: '+e.message,true);}hideLoading();

function renderMonthlyCalendar(month,dailyDataMap,meals){
  const [y,m]=month.split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay(); // 0=일
  const lastDate=new Date(y,m,0).getDate();
  const DOWS=['일','월','화','수','목','금','토'];

  let html=`<div style="margin-top:20px;">
    <div class="cal-header"><div class="cal-title">📅 ${month} 일별 현황</div></div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green);"></div>식재비율 ~48%</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--amber);"></div>49~53%</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--red);"></div>54%~</div>
    </div>
    <div class="cal-grid">`;

  // 요일 헤더
  DOWS.forEach((d,i)=>html+=`<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`);

  // 빈 칸
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;

  // 날짜 칸
  for(let d=1;d<=lastDate;d++){
    const dateStr=`${month}-${String(d).padStart(2,'0')}`;
    const dow=new Date(y,m-1,d).getDay();
    const isToday=dateStr===todayKST;
    const data=dailyDataMap[dateStr];
    let daySales=0,dayVendor=0;
    if(data){
      meals.forEach(meal=>{const md=data.meals?.[meal]||{};daySales+=(md.count||0)*(md.price||0);});
      Object.values(data.vendors||{}).forEach(v=>dayVendor+=v||0);
    }
    const ratio=daySales>0?Math.round(dayVendor/daySales*100):null;
    const ratioClass=ratio===null?'':ratio<=48?'g':ratio<=53?'a':'r';

    html+=`<div class="cal-day${dow===0?' sun':dow===6?' sat':''}${isToday?' today':''}${data?' has-data':''}">
      <div class="cal-day-num">${d}</div>
      ${daySales>0?`<div class="cal-day-sales">${(daySales/10000).toFixed(0)}만</div>`:''}
      ${ratio!==null?`<div class="cal-day-ratio ${ratioClass}">${ratio}%</div>`:''}
    </div>`;
  }

  html+=`</div></div>`;
  return html;
}

window.downloadMonthlyExcel=function(site,month,sales,vendor,pay){

          <input type="number" id="mc-price-${esc(site)}-${m}" value="${cfg.prices?.[m]||''}" placeholder="0" style="height:40px;font-size:14px;flex:1;text-align:right;" />
          <span style="font-size:13px;color:var(--text3);">원</span>
        </div>`).join('')}

        <div class="panel-label">추가 식재료 거래처 <span style="font-size:11px;color:var(--text3);">(기본 12개 외 추가)</span></div>
        <div id="mc-extra-vendors-${esc(site)}">${(cfg.extraVendors||[]).map((v,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:13px;flex:1;">${v}</span><button class="btn-sm danger" onclick="removeExtraVendor('${site}',${i})">삭제</button></div>`).join('')}</div>
        <div style="display:flex;gap:6px;margin-top:8px;"><input type="text" id="mc-new-vendor-${esc(site)}" placeholder="거래처명 직접 입력" style="height:40px;font-size:14px;"/><button class="btn-sm" onclick="addExtraVendor('${site}')">추가</button></div>

        <div class="panel-label">근무자</div>
        <div id="mc-workers-${esc(site)}">${(cfg.workers||[]).map((w,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:13px;flex:1;">${w.name} <span style="font-size:11px;color:var(--text3);">${w.type}</span></span><button class="btn-sm danger" onclick="removeMCWorker('${site}',${i})">삭제</button></div>`).join('')}</div>
        <div style="display:flex;gap:6px;margin-top:8px;">
          <input type="text" id="mc-wn-${esc(site)}" placeholder="이름" style="height:40px;font-size:14px;"/>
          <select id="mc-wt-${esc(site)}" style="height:40px;font-size:14px;width:100px;"><option value="고용직">고용직</option><option value="일용직">일용직</option></select>
          <button class="btn-sm" onclick="addMCWorker('${site}')">추가</button>
        </div>
        <button onclick="saveMCConfig('${site}')" style="width:100%;padding:12px;font-size:14px;font-weight:500;background:var(--text1);color:var(--bg2);border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:16px;">저장</button>
      </div>
    </div>`;
  });
  document.getElementById('myconfig-content').innerHTML=html;
}
window.toggleMC=function(site){document.getElementById('mc-'+esc(site)).classList.toggle('open');};
window.toggleChipMC=function(el,site,field,val){
  el.classList.toggle('on');const cfg=getSiteConfig(site);if(!cfg[field])cfg[field]=[];
  if(el.classList.contains('on')){if(!cfg[field].includes(val))cfg[field].push(val);}else cfg[field]=cfg[field].filter(x=>x!==val);
};
window.addExtraVendor=function(site){
  const el=document.getElementById(`mc-new-vendor-${esc(site)}`);const val=el.value.trim();if(!val)return;
  const cfg=getSiteConfig(site);if(!cfg.extraVendors)cfg.extraVendors=[];
  if(cfg.extraVendors.includes(val)){showToast('이미 추가된 거래처예요',true);return;}
  cfg.extraVendors.push(val);el.value='';renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');
};
window.removeExtraVendor=function(site,idx){const cfg=getSiteConfig(site);cfg.extraVendors.splice(idx,1);renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');};
window.addMCWorker=function(site){
  const n=document.getElementById(`mc-wn-${esc(site)}`).value.trim();const t=document.getElementById(`mc-wt-${esc(site)}`).value;
  if(!n){showToast('이름을 입력해주세요',true);return;}
  const cfg=getSiteConfig(site);if(!cfg.workers)cfg.workers=[];cfg.workers.push({name:n,type:t});
  renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');
};
window.removeMCWorker=function(site,idx){const cfg=getSiteConfig(site);cfg.workers.splice(idx,1);renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');};
window.saveMCConfig=async function(site){
  showLoading('저장 중...');
  try{
    const cfg=getSiteConfig(site);
    if(!cfg.prices)cfg.prices={};
    ALL_MEAL_TYPES.forEach(m=>{const v=parseFloat(document.getElementById(`mc-price-${esc(site)}-${m}`)?.value)||0;if(v)cfg.prices[m]=v;});
    await saveConfig();hideLoading();showToast(`${site} 설정 저장 완료!`);
  }catch(e){hideLoading();showToast('저장 실패: '+e.message,true);}
};

// ── 관리자 설정 ──
function renderAdminConfig(){
  const sites=getAllSites().sort((a,b)=>a.localeCompare(b,'ko'));
  const addForm=`<div style="background:var(--bg2);border:1.5px dashed var(--border);border-radius:12px;padding:16px;margin-bottom:12px;">
    <div style="font-size:14px;font-weight:500;margin-bottom:12px;">+ 새 사업장 추가</div>
    <div style="margin-bottom:10px;"><label class="field-label">사업장 이름</label><input type="text" id="new-site-name" placeholder="사업장 이름"/></div>
    <div style="margin-bottom:10px;"><label class="field-label">담당 매니저</label>
      <select id="new-site-mgr"><option value="">기존 매니저 선택</option>${[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(m=>`<option>${m.name}</option>`).join('')}</select>
      <div style="margin-top:6px;display:flex;align-items:center;gap:8px;"><span style="font-size:12px;color:var(--text3);white-space:nowrap;">또는 새 매니저:</span><input type="text" id="new-site-new-mgr" placeholder="새 매니저 이름" style="height:40px;"/></div>
    </div>
    <button onclick="addNewSite()" style="width:100%;padding:12px;font-size:14px;font-weight:500;background:var(--text1);color:var(--bg2);border:none;border-radius:10px;cursor:pointer;font-family:inherit;">추가</button>
  </div>`;
  const sitesHtml=sites.map(site=>{
    const cfg=getSiteConfig(site);const mgr=getManagerForSite(site)?.name||'미지정';
    return `<div class="settings-card" id="sc-${esc(site)}">
      <div class="settings-head" onclick="toggleSC('${site}')">
        <div><div class="settings-name">${site}</div><div class="settings-info">담당: ${mgr}</div></div>
        <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="settings-panel">
        <div class="panel-label">담당 매니저</div>
        <select id="sc-mgr-${esc(site)}">${[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(m=>`<option value="${m.name}"${m.name===mgr?' selected':''}>${m.name}</option>`).join('')}</select>
        <div style="margin-top:6px;display:flex;align-items:center;gap:8px;"><span style="font-size:12px;color:var(--text3);white-space:nowrap;">새 매니저:</span><input type="text" id="sc-newmgr-${esc(site)}" placeholder="없으면 비워두세요" style="height:40px;"/></div>
        <div class="panel-label">끼니</div>
        <div class="chip-row">${ALL_MEAL_TYPES.map(m=>`<div class="chip${(cfg.meals||[]).includes(m)?' on':''}" onclick="toggleChip(this,'${site}','meals','${m}')">${m}</div>`).join('')}</div>
        <div class="panel-label">근무자</div>
        <div id="workers-${esc(site)}">${(cfg.workers||[]).map((w,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:13px;flex:1;">${w.name} <span style="font-size:11px;color:var(--text3);">${w.type}</span></span><button class="btn-sm danger" onclick="removeWorker('${site}',${i})">삭제</button></div>`).join('')}</div>
        <div style="display:flex;gap:6px;margin-top:8px;">
          <input type="text" id="wn-${esc(site)}" placeholder="이름" style="height:40px;font-size:14px;"/>
          <select id="wt-${esc(site)}" style="height:40px;font-size:14px;width:100px;"><option value="고용직">고용직</option><option value="일용직">일용직</option></select>
          <button class="btn-sm" onclick="addWorker('${site}')">추가</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button onclick="saveSiteConfig('${site}')" style="flex:1;padding:12px;font-size:14px;font-weight:500;background:var(--text1);color:var(--bg2);border:none;border-radius:10px;cursor:pointer;font-family:inherit;">저장</button>
          <button onclick="deleteSite('${site}')" style="padding:0 14px;height:46px;font-size:13px;background:none;border:1px solid var(--red);border-radius:10px;cursor:pointer;color:var(--red);">삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('config-list').innerHTML=addForm+sitesHtml;
}
window.toggleSC=function(site){document.getElementById('sc-'+esc(site)).classList.toggle('open');};
window.toggleChip=function(el,site,field,val){
  el.classList.toggle('on');const cfg=getSiteConfig(site);if(!cfg[field])cfg[field]=[];
  if(el.classList.contains('on')){if(!cfg[field].includes(val))cfg[field].push(val);}else cfg[field]=cfg[field].filter(x=>x!==val);
};
window.addWorker=function(site){
  const n=document.getElementById(`wn-${esc(site)}`).value.trim();const t=document.getElementById(`wt-${esc(site)}`).value;
  if(!n){showToast('이름을 입력해주세요',true);return;}
  const cfg=getSiteConfig(site);if(!cfg.workers)cfg.workers=[];cfg.workers.push({name:n,type:t});
  renderAdminConfig();document.getElementById('sc-'+esc(site)).classList.add('open');
};
window.removeWorker=function(site,idx){const cfg=getSiteConfig(site);cfg.workers.splice(idx,1);renderAdminConfig();document.getElementById('sc-'+esc(site)).classList.add('open');};
window.saveSiteConfig=async function(site){
  showLoading('저장 중...');
  try{
    const sel=document.getElementById(`sc-mgr-${esc(site)}`).value;const newN=document.getElementById(`sc-newmgr-${esc(site)}`)?.value.trim();const finalMgr=newN||sel;
    if(newN&&!MANAGERS.find(m=>m.name===newN))MANAGERS.push({name:newN,sites:[]});
    MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==site);});
    const mgr=MANAGERS.find(m=>m.name===finalMgr);if(mgr&&!mgr.sites.includes(site))mgr.sites.push(site);
    await saveConfig();hideLoading();showToast(`${site} 저장 완료!`);renderAdminConfig();
  }catch(e){hideLoading();showToast('저장 실패',true);}
};
window.deleteSite=async function(site){
  if(!confirm(`"${site}" 삭제할까요?`))return;showLoading('삭제 중...');
  try{MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==site);});delete SITE_CONFIG[site];await saveConfig();hideLoading();showToast('삭제 완료!');renderAdminConfig();}
  catch(e){hideLoading();showToast('실패',true);}
};
window.addNewSite=async function(){
  const name=document.getElementById('new-site-name').value.trim();const ex=document.getElementById('new-site-mgr').value;const newM=document.getElementById('new-site-new-mgr').value.trim();const mgr=newM||ex;
  if(!name){showToast('사업장 이름 입력해주세요',true);return;}if(getAllSites().includes(name)){showToast('이미 존재하는 사업장',true);return;}if(!mgr){showToast('담당 매니저를 선택하거나 입력해주세요',true);return;}
  showLoading('추가 중...');
  try{
    if(newM&&!MANAGERS.find(m=>m.name===newM))MANAGERS.push({name:newM,sites:[]});
    SITE_CONFIG[name]={meals:['중식'],prices:{},extraVendors:[],expenses:[],workers:[]};
    const m=MANAGERS.find(x=>x.name===mgr);if(m&&!m.sites.includes(name))m.sites.push(name);
    await saveConfig();hideLoading();showToast(`${name} 추가 완료!`);
    document.getElementById('new-site-name').value='';document.getElementById('new-site-new-mgr').value='';document.getElementById('new-site-mgr').value='';
    renderAdminConfig();setTimeout(()=>{const c=document.getElementById('sc-'+esc(name));if(c){c.classList.add('open');c.scrollIntoView({behavior:'smooth',block:'center'});}},200);
  }catch(e){hideLoading();showToast('추가 실패',true);}
};

function renderAdminSites(){renderAdminConfig();}
</script>
</body>
</html>
