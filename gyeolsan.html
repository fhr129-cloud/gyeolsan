<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온정 F&B 결산</title>
<style>
:root{--bg:#f5f5f3;--bg2:#fff;--bg3:#fafafa;--border:#e0e0e0;--border2:#e8e8e8;--text1:#1a1a1a;--text2:#666;--text3:#999;--text4:#bbb;--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--red:#e24b4a;--amber:#BA7517;--amber-light:#FAEEDA;}
.dark{--bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;--border:#333;--border2:#2a2a2a;--text1:#f0f0f0;--text2:#aaa;--text3:#666;--text4:#444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-logo{height:56px;object-fit:contain;margin-bottom:2rem;}
.login-title{font-size:20px;font-weight:600;color:var(--text1);margin-bottom:6px;}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:2.5rem;text-align:center;}
.btn-google{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:15px;font-weight:500;color:var(--text1);font-family:inherit;width:100%;max-width:320px;justify-content:center;}
.btn-google:hover{background:var(--bg3);}
.google-icon{width:20px;height:20px;flex-shrink:0;}

.pending-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.pending-icon{width:64px;height:64px;border-radius:50%;background:var(--amber-light);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;}
.pending-title{font-size:18px;font-weight:600;color:var(--text1);margin-bottom:8px;}
.pending-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem;}
.btn-logout{padding:10px 20px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit;}

.name-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.name-title{font-size:18px;font-weight:600;color:var(--text1);margin-bottom:6px;}
.name-sub{font-size:14px;color:var(--text2);margin-bottom:1.5rem;text-align:center;}
.name-select{width:100%;max-width:320px;height:48px;padding:0 14px;font-size:16px;border:1px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;margin-bottom:12px;}
.btn-confirm{width:100%;max-width:320px;padding:14px;background:var(--text1);color:var(--bg2);border:none;border-radius:12px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;}

.app{max-width:100%;margin:0 auto;display:none;}
.app.active{display:block;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{height:32px;object-fit:contain;}
.topbar-site{font-size:14px;font-weight:500;color:var(--text1);}
.topbar-name{font-size:12px;color:var(--text2);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-icon{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;scrollbar-width:none;position:sticky;top:53px;z-index:99;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:12px 16px;font-size:14px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;}
.tab.active{color:var(--text1);border-bottom:2px solid var(--text1);font-weight:500;}
.content{padding:1rem;padding-bottom:3rem;max-width:100%;overflow-x:hidden;}

.admin-tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;scrollbar-width:none;}
.admin-tab-bar::-webkit-scrollbar{display:none;}

select,input[type="date"],input[type="month"],input[type="text"],input[type="number"],input[type="email"]{width:100%;height:44px;padding:0 12px;font-size:16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;appearance:none;}
select:focus,input:focus{outline:none;border-color:var(--text1);}
select:disabled{opacity:0.4;cursor:not-allowed;}
.field-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.form-group{margin-bottom:1.25rem;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border2);}
.card-title{font-size:14px;font-weight:500;color:var(--text1);}
.irow{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border2);}
.irow:last-child{border-bottom:none;}
.irow-label{font-size:13px;color:var(--text2);}
.irow-val{font-size:14px;font-weight:500;color:var(--text1);}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat{background:var(--bg3);border-radius:10px;padding:12px 14px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:500;color:var(--text1);}
.stat-val.g{color:var(--green);}
.stat-val.r{color:var(--red);}
.stat-val.a{color:var(--amber);}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;}
.badge-g{background:var(--green-light);color:var(--green-dark);}
.badge-a{background:var(--amber-light);color:var(--amber);}
.badge-r{background:#FCEBEB;color:#791F1F;}
.badge-gray{background:var(--bg3);color:var(--text3);}
.btn-primary{width:100%;padding:14px;background:var(--text1);color:var(--bg2);border:none;border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{width:100%;padding:12px;background:var(--bg2);color:var(--text1);border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:6px;}
.btn-sm{padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-sm.danger{border-color:var(--red);color:var(--red);background:none;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text4);font-size:14px;}
.required{color:var(--red);margin-left:2px;}
.section{display:none;}.section.active{display:block;}

/* ── 일마감 가로축 테이블 ── */
.dt-sum{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.dt-sc{background:var(--bg3);border-radius:10px;padding:10px 12px;}
.dt-sl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.dt-sv{font-size:17px;font-weight:500;color:var(--text1);}
.dt-sv.g{color:var(--green);}
.dt-sv.r{color:var(--red);}
.dt-sv.a{color:var(--amber);}
.dt-wrap{overflow-x:auto;border:1px solid var(--border2);border-radius:12px;background:var(--bg2);margin-bottom:12px;}
.dt{border-collapse:collapse;font-size:12px;}
.dt th,.dt td{border:0.5px solid var(--border2);white-space:nowrap;padding:0;}
.dt th{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:500;padding:5px 8px;text-align:center;}
.dt th.dt-lh{text-align:left;padding:5px 12px;position:sticky;left:0;z-index:3;background:var(--bg3);min-width:130px;}
.dt td.dt-rl{position:sticky;left:0;z-index:2;background:var(--bg2);font-size:12px;color:var(--text2);padding:3px 12px;white-space:nowrap;border-right:1px solid var(--border);min-width:130px;}
.dt td.dt-rl.sh{background:var(--bg3);font-weight:500;color:var(--text1);}
.dt td.dt-rl.in1{padding-left:18px;}
.dt td.dt-rl.in2{padding-left:28px;}
.dt-inp{width:72px;height:30px;border:none;background:transparent;font-size:12px;text-align:right;padding:0 6px;color:var(--text1);font-family:inherit;display:block;}
.dt-inp:focus{outline:none;background:#EEF7FD;}
.dt-inp::-webkit-inner-spin-button,.dt-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
.dt-auto{font-size:12px;padding:3px 8px;text-align:right;display:block;min-width:72px;}
.dt-ratio{font-size:12px;padding:3px 8px;text-align:center;display:block;}
.dt td.dt-today{background:rgba(29,158,117,0.07);}
.dt th.dt-today{background:rgba(29,158,117,0.15);color:var(--green-dark);}
.dt th.dt-sun{color:var(--red);}
.dt th.dt-sat{color:#378ADD;}
.dt tr.dt-sr td,.dt tr.dt-sr th{background:var(--bg3);}
.dt td.dt-wsep,.dt th.dt-wsep{border-left:2px solid var(--border)!important;}

/* 주간 탭 */
.week-tabs{display:flex;gap:6px;margin-bottom:12px;}
.wk{flex:1;padding:8px 4px;text-align:center;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--bg2);}
.wk-num{font-size:12px;font-weight:500;color:var(--text1);margin-bottom:2px;}
.wk-st{font-size:10px;color:var(--text3);}
.wk.done{background:var(--green-light);border-color:var(--green);}
.wk.done .wk-num{color:var(--green-dark);}
.wk.done .wk-st{color:var(--green);}
.wk.cur{background:var(--text1);border-color:var(--text1);}
.wk.cur .wk-num,.wk.cur .wk-st{color:var(--bg2);}

.settings-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.settings-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;}
.settings-head:hover{background:var(--bg3);}
.settings-name{font-size:14px;font-weight:500;color:var(--text1);}
.settings-info{font-size:12px;color:var(--text2);margin-top:2px;}
.settings-panel{display:none;padding:16px;border-top:1px solid var(--border2);}
.settings-card.open .settings-panel{display:block;}
.chevron{width:16px;height:16px;stroke:var(--text4);fill:none;stroke-width:2;transition:transform 0.2s;}
.settings-card.open .chevron{transform:rotate(180deg);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:6px 14px;font-size:13px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--bg3);color:var(--text2);}
.chip.on{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:500;}
.panel-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;margin-top:14px;}
.panel-label:first-child{margin-top:0;}

.user-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:500;color:var(--text1);}
.user-email{font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-site{font-size:12px;color:var(--text3);margin-top:2px;}
.user-actions{display:flex;gap:6px;flex-shrink:0;}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.dark .loading-overlay{background:rgba(0,0,0,0.75);}
.loading-overlay.show{display:flex;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--text1);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text2);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text1);color:var(--bg2);padding:12px 22px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;}
.toast.error{background:var(--red);}
@media(max-width:480px){.two-col{grid-template-columns:1fr;}.stat-grid{grid-template-columns:1fr 1fr;}.dt-sum{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="screen-login" style="display:none;">
  <div class="login-screen">
    <img src="logo.jpg" class="login-logo" id="login-logo" alt="온정 F&B" />
    <div class="login-title">온정 F&B 결산 시스템</div>
    <div class="login-sub">구글 계정으로 로그인해주세요</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>
    <div style="margin-top:16px;width:100%;max-width:320px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;"><div style="flex:1;height:1px;background:var(--border);"></div><span style="font-size:12px;color:var(--text4);">테스트</span><div style="flex:1;height:1px;background:var(--border);"></div></div>
      <select id="test-manager-select" style="width:100%;height:44px;font-size:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);padding:0 12px;margin-bottom:8px;"><option value="">매니저 선택 (테스트용)</option></select>
      <button onclick="testLogin()" style="width:100%;padding:12px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;">테스트로 입장</button>
    </div>
  </div>
</div>

<div id="screen-name" style="display:none;">
  <div class="name-screen">
    <img src="logo.jpg" style="height:44px;object-fit:contain;margin-bottom:1.5rem;" alt="온정 F&B" />
    <div class="name-title">처음 오셨군요!</div>
    <div class="name-sub">담당 매니저 이름을 선택해주세요.<br>관리자 승인 후 사용할 수 있어요.</div>
    <select class="name-select" id="name-select"><option value="">매니저 이름 선택</option></select>
    <button class="btn-confirm" onclick="submitName()" style="margin-top:12px;">확인</button>
  </div>
</div>

<div id="screen-pending" style="display:none;">
  <div class="pending-screen">
    <div class="pending-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="pending-title">승인 대기 중</div>
    <div class="pending-sub">관리자가 계정을 승인하면<br>사용할 수 있어요.<br>잠시만 기다려주세요.</div>
    <button class="btn-logout" onclick="signOut()">로그아웃</button>
  </div>
</div>

<!-- 매니저 앱 -->
<div class="app" id="app-manager">
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo.jpg" class="topbar-logo" id="topbar-logo" alt="" />
      <div>
        <div class="topbar-site" id="topbar-site">-</div>
        <div class="topbar-name" id="topbar-name">-</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" onclick="toggleDark()" id="dark-btn">🌙</button>
      <button class="btn-icon" onclick="signOut()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchManagerTab('daily')">일마감</button>
    <button class="tab" onclick="switchManagerTab('attendance')">근태</button>
    <button class="tab" onclick="switchManagerTab('weekly')">주간현황</button>
    <button class="tab" onclick="switchManagerTab('monthly')">월말결산</button>
    <button class="tab" onclick="switchManagerTab('myconfig')">내 설정</button>
  </div>
  <div class="content">
    <div class="section active" id="mgr-daily">
      <div class="two-col" style="margin-bottom:1rem;">
        <div><label class="field-label">사업장</label><select id="mgr-daily-site" onchange="loadDailyTable()"><option value="">선택</option></select></div>
        <div><label class="field-label">월</label><input type="month" id="mgr-daily-month" onchange="loadDailyTable()" /></div>
      </div>
      <div id="daily-table-wrap"><div class="empty-state">사업장과 월을 선택해주세요</div></div>
    </div>
    <div class="section" id="mgr-attendance">
      <div class="two-col" style="margin-bottom:1rem;">
        <div><label class="field-label">사업장</label><select id="mgr-att-site" onchange="loadAttendance()"><option value="">선택</option></select></div>
        <div><label class="field-label">월</label><input type="month" id="mgr-att-month" onchange="loadAttendance()" /></div>
      </div>
      <div class="week-tabs" id="att-week-tabs"></div>
      <div id="att-content"><div class="empty-state">사업장과 월을 선택해주세요</div></div>
    </div>
    <div class="section" id="mgr-weekly">
      <div class="two-col" style="margin-bottom:1rem;">
        <div><label class="field-label">사업장</label><select id="mgr-weekly-site" onchange="loadWeekly()"><option value="">선택</option></select></div>
        <div><label class="field-label">월</label><input type="month" id="mgr-weekly-month" onchange="loadWeekly()" /></div>
      </div>
      <div id="weekly-content"><div class="empty-state">조회 조건을 선택해주세요</div></div>
    </div>
    <div class="section" id="mgr-monthly">
      <div class="two-col" style="margin-bottom:1rem;">
        <div><label class="field-label">사업장</label><select id="mgr-monthly-site" onchange="loadMonthly()"><option value="">선택</option></select></div>
        <div><label class="field-label">월</label><input type="month" id="mgr-monthly-month" onchange="loadMonthly()" /></div>
      </div>
      <div id="monthly-content"><div class="empty-state">조회 조건을 선택해주세요</div></div>
    </div>
    <div class="section" id="mgr-myconfig">
      <div id="myconfig-content"><div class="empty-state">불러오는 중...</div></div>
    </div>
  </div>
</div>

<!-- 관리자 앱 -->
<div class="app" id="app-admin">
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo.jpg" class="topbar-logo" id="admin-logo" alt="" />
      <div>
        <div class="topbar-site">관리자</div>
        <div class="topbar-name" id="admin-name">-</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" onclick="toggleDark()" id="admin-dark-btn">🌙</button>
      <button class="btn-icon" onclick="signOut()">

function esc(s){return s.replace(/[^a-zA-Z0-9가-힣]/g,'_');}
function fmtNum(n){return n?n.toLocaleString():''}
function getDates(from,to){const d=[],c=new Date(from),e=new Date(to);while(c<=e){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}
function getDaysInMonth(month){const[y,m]=month.split('-').map(Number);const last=new Date(y,m,0).getDate();return getDates(`${month}-01`,`${month}-${String(last).padStart(2,'0')}`);}
function getWeeks(month){const dates=getDaysInMonth(month);const weeks=[];let w=[];dates.forEach(d=>{w.push(d);if(new Date(d).getDay()===0||d===dates[dates.length-1]){weeks.push([...w]);w=[];}});if(w.length)weeks.push(w);return weeks;}
function getWeekGroups(dates){const groups=[];let cur={week:1,start:0,end:0};dates.forEach((d,i)=>{cur.end=i;if(new Date(d).getDay()===0&&i<dates.length-1){groups.push({...cur});cur={week:cur.week+1,start:i+1,end:i+1};}});groups.push({...cur});return groups;}

async function loadApproval(){
  try{
    const snap=await getDocs(query(collection(db,'users')));
    const users=[];snap.forEach(d=>users.push(d.data()));
    const pending=users.filter(u=>u.status==='pending');
    const approved=users.filter(u=>u.status==='approved');
    let html='';
    if(pending.length){
      html+=`<div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;">승인 대기 (${pending.length}명)</div>`;
      html+=pending.map(u=>`<div class="user-card"><div class="user-info"><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div><div class="user-site">${(u.sites||[]).join(', ')||'사업장 없음'}</div></div><div class="user-actions"><button class="btn-sm" style="background:var(--green-light);color:var(--green-dark);border-color:var(--green);" onclick="approveUser('${u.uid}')">승인</button><button class="btn-sm danger" onclick="rejectUser('${u.uid}')">거절</button></div></div>`).join('');
    }
    if(approved.length){
      html+=`<div style="font-size:13px;font-weight:500;color:var(--text2);margin:16px 0 8px;">승인된 계정 (${approved.length}명)</div>`;
      html+=approved.map(u=>`<div class="user-card"><div class="user-info"><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div><div class="user-site">${(u.sites||[]).join(', ')||'사업장 없음'}</div></div><div class="user-actions"><button class="btn-sm danger" onclick="revokeUser('${u.uid}')">취소</button></div></div>`).join('');
    }
    if(!pending.length&&!approved.length)html='<div class="empty-state">등록된 계정이 없어요</div>';
    document.getElementById('approval-list').innerHTML=html;
  }catch(e){showToast('불러오기 실패',true);}
}

window.loadDailyTable=async function(){
  const site=document.getElementById('mgr-daily-site').value;
  const month=document.getElementById('mgr-daily-month').value;
  const wrap=document.getElementById('daily-table-wrap');
  if(!site||!month){wrap.innerHTML='<div class="empty-state">사업장과 월을 선택해주세요</div>';return;}
  showLoading('불러오는 중...');
  try{
    const cfg=getSiteConfig(site);
    const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
    const vendors=cfg.vendors||[];
    const dates=getDaysInMonth(month);
    const savedData={};
    for(const date of dates){
      const snap=await getDoc(doc(db,'daily',`${esc(site)}_${date}`));
      if(snap.exists())savedData[date]=snap.data();
    }
    renderDailyTable(site,month,meals,vendors,dates,savedData);
  }catch(e){showToast('불러오기 실패: '+e.message,true);console.error(e);}
  hideLoading();
};

function renderDailyTable(site,month,meals,vendors,dates,savedData){
  const wrap=document.getElementById('daily-table-wrap');
  const weekGroups=getWeekGroups(dates);
  const weekStartIdxs=new Set(weekGroups.map(g=>g.start));

  function isWsep(di){return weekStartIdxs.has(di);}
  function todayCls(d){return d===todayKST?' dt-today':'';}
  function thCls(d){const day=new Date(d).getDay();return d===todayKST?'dt-today':day===0?'dt-sun':day===6?'dt-sat':'';}
  function wsep(di){return isWsep(di)?' dt-wsep':'';}

  // ── 요약 카드 ──
  const sumHtml=`<div class="dt-sum">
    <div class="dt-sc"><div class="dt-sl">월 매출</div><div class="dt-sv" id="dsum-sales">-</div></div>
    <div class="dt-sc"><div class="dt-sl">식재료비</div><div class="dt-sv" id="dsum-vendor">-</div></div>
    <div class="dt-sc"><div class="dt-sl">식재비율</div><div class="dt-sv" id="dsum-ratio">-</div></div>
    <div class="dt-sc"><div class="dt-sl">매출총이익</div><div class="dt-sv g" id="dsum-profit">-</div></div>
  </div>`;

  // ── 헤더 행1: 주차 ──
  let thead='<thead><tr><th class="dt-lh" rowspan="2">항목</th>';
  weekGroups.forEach(g=>{
    thead+=`<th colspan="${g.end-g.start+1}" class="dt-wsep">${g.week}주차</th>`;
  });
  thead+='<th class="dt-wsep">합계</th></tr>';

  // ── 헤더 행2: 날짜 ──
  thead+='<tr>';
  dates.forEach((d,di)=>{
    const day=new Date(d).getDay();
    thead+=`<th class="${thCls(d)}${wsep(di)}">${d.slice(5)}<br><span style="font-weight:400;">(${DAYS[day]})</span></th>`;
  });
  thead+='<th class="dt-wsep">합계</th></tr></thead>';

  // ── 셀 헬퍼 ──
  function inputTd(date,field,di){
    let val='';
    const prev=savedData[date];
    if(prev){
      if(field.startsWith('cnt_'))val=prev.meals?.[field.replace('cnt_','')]?.count||'';
      else if(field.startsWith('price_'))val=prev.meals?.[field.replace('price_','')]?.price||'';
      else if(field.startsWith('v_'))val=prev.vendors?.[field.replace('v_','')]||'';
    }
    return `<td class="${todayCls(date)}${wsep(di)}"><input class="dt-inp" type="number" data-date="${date}" data-field="${field}" value="${val||''}" min="0" oninput="recalcDaily()"/></td>`;
  }
  function autoTd(id,di,d,style=''){
    return `<td class="${todayCls(d)}${wsep(di)}"><span class="dt-auto" id="${id}" style="${style}"></span></td>`;
  }
  function ratioTd(id,di,d){
    return `<td class="${todayCls(d)}${wsep(di)}"><span class="dt-ratio" id="${id}"></span></td>`;
  }
  function sectionRow(label){
    let r=`<tr class="dt-sr"><td class="dt-rl sh">${label}</td>`;
    dates.forEach((d,di)=>r+=`<td class="${todayCls(d)}${wsep(di)}"></td>`);
    r+=`<td class="dt-wsep"></td></tr>`;
    return r;
  }

  // ── tbody ──
  let tbody='<tbody>';

  // 매출 섹션
  tbody+=sectionRow('■ 매출');
  meals.forEach(meal=>{
    tbody+=`<tr><td class="dt-rl in1">식수 (${meal})</td>`;
    dates.forEach((d,di)=>tbody+=inputTd(d,`cnt_${meal}`,di));
    tbody+=`<td class="dt-wsep"><span class="dt-auto" id="tot-cnt-${meal}"></span></td></tr>`;

    tbody+=`<tr><td class="dt-rl in2">식단가</td>`;
    dates.forEach((d,di)=>tbody+=inputTd(d,`price_${meal}`,di));
    tbody+=`<td class="dt-wsep"></td></tr>`;
  });
  tbody+=`<tr><td class="dt-rl in1" style="font-weight:500;">매출 계</td>`;
  dates.forEach((d,di)=>tbody+=autoTd(`sales-${d}`,di,d,'font-weight:500;'));
  tbody+=`<td class="dt-wsep"><span class="dt-auto" id="tot-sales" style="font-weight:500;"></span></td></tr>`;

  // 재료비 섹션
  if(vendors.length){
    tbody+=sectionRow('■ 재료비');
    vendors.forEach(v=>{
      tbody+=`<tr><td class="dt-rl in2">${v}</td>`;
      dates.forEach((d,di)=>tbody+=inputTd(d,`v_${v}`,di));
      tbody+=`<td class="dt-wsep"><span class="dt-auto" id="tot-v-${esc(v)}"></span></td></tr>`;
    });
    tbody+=`<tr><td class="dt-rl in1" style="font-weight:500;">재료비 계</td>`;
    dates.forEach((d,di)=>tbody+=autoTd(`vendor-${d}`,di,d,'font-weight:500;'));
    tbody+=`<td class="dt-wsep"><span class="dt-auto" id="tot-vendor" style="font-weight:500;"></span></td></tr>`;

window.recalcDaily=function(){
  const site=document.getElementById('mgr-daily-site').value;
  const month=document.getElementById('mgr-daily-month').value;
  if(!site||!month)return;
  const cfg=getSiteConfig(site);
  const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
  const vendors=cfg.vendors||[];
  const dates=getDaysInMonth(month);

  function gv(date,field){const el=document.querySelector(`[data-date="${date}"][data-field="${field}"]`);return el?parseFloat(el.value)||0:0;}
  function st(id,val,style){const el=document.getElementById(id);if(!el)return;el.textContent=val;if(style!==undefined)el.style.cssText=style;}

  let tSales=0,tVendor=0;
  const mealCntTotals={};meals.forEach(m=>mealCntTotals[m]=0);
  const vendorTotals={};vendors.forEach(v=>vendorTotals[v]=0);

  dates.forEach(d=>{
    let daySales=0,dayVendor=0;
    meals.forEach(m=>{const cnt=gv(d,`cnt_${m}`),price=gv(d,`price_${m}`);daySales+=cnt*price;mealCntTotals[m]+=cnt;});
    vendors.forEach(v=>{const amt=gv(d,`v_${v}`);dayVendor+=amt;vendorTotals[v]+=amt;});
    tSales+=daySales;tVendor+=dayVendor;

    st(`sales-${d}`,daySales?fmtNum(daySales):'');
    st(`vendor-${d}`,dayVendor?fmtNum(dayVendor):'');
    const p=daySales-dayVendor;
    st(`profit-${d}`,daySales?fmtNum(p):'',p<0?'color:var(--red)':p>0?'color:var(--green)':'');
    const r=daySales>0?Math.round(dayVendor/daySales*100):null;
    st(`ratio-${d}`,r!==null?r+'%':'',r!==null?ratioStyle(r):'');
  });

  meals.forEach(m=>st(`tot-cnt-${m}`,mealCntTotals[m]?fmtNum(mealCntTotals[m]):''));
  vendors.forEach(v=>st(`tot-v-${esc(v)}`,vendorTotals[v]?fmtNum(vendorTotals[v]):''));
  st('tot-sales',tSales?fmtNum(tSales):'','font-weight:500;');
  st('tot-vendor',tVendor?fmtNum(tVendor):'','font-weight:500;');
  const tp=tSales-tVendor;
  st('tot-profit',tSales?fmtNum(tp):'',`font-weight:500;${tp<0?'color:var(--red)':tp>0?'color:var(--green)':''}`);
  const tr=tSales>0?Math.round(tVendor/tSales*100):null;
  st('tot-ratio',tr!==null?tr+'%':'',tr!==null?ratioStyle(tr):'');

  // 요약 카드
  const ds=document.getElementById('dsum-sales');if(ds)ds.textContent=tSales?fmtNum(tSales)+'원':'-';
  const dv=document.getElementById('dsum-vendor');if(dv)dv.textContent=tVendor?fmtNum(tVendor)+'원':'-';
  const dr=document.getElementById('dsum-ratio');
  if(dr){dr.textContent=tr!==null?tr+'%':'-';dr.className='dt-sv'+(tr!==null?(tr>53?' r':tr>48?' a':' g'):'');}
  const dp=document.getElementById('dsum-profit');
  if(dp){dp.textContent=tSales?fmtNum(tp)+'원':'-';dp.className='dt-sv'+(tp<0?' r':' g');}
};

window.saveDailyAll=async function(site,month){
  showLoading('저장 중...');
  try{
    const cfg=getSiteConfig(site);
    const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
    const vendors=cfg.vendors||[];
    const dates=getDaysInMonth(month);
    const manager=currentUserData?.name||'';
    let saved=0;
    for(const date of dates){
      const mealsData={};let hasData=false;
      meals.forEach(m=>{
        const el=document.querySelector(`[data-date="${date}"][data-field="cnt_${m}"]`);
        const el2=document.querySelector(`[data-date="${date}"][data-field="price_${m}"]`);
        const cnt=parseFloat(el?.value)||0,price=parseFloat(el2?.value)||0;
        mealsData[m]={count:cnt,price};if(cnt||price)hasData=true;
      });
      const vendorsData={};
      vendors.forEach(v=>{
        const el=document.querySelector(`[data-date="${date}"][data-field="v_${v}"]`);
        const amt=parseFloat(el?.value)||0;vendorsData[v]=amt;if(amt)hasData=true;
      });
      if(hasData){
        await setDoc(doc(db,'daily',`${esc(site)}_${date}`),{site,date,month,manager,meals:mealsData,vendors:vendorsData,savedAt:new Date().toISOString()});
        saved++;
      }
    }
    showToast(`${saved}일 저장 완료!`);
  }catch(e){showToast('저장 실패: '+e.message,true);console.error(e);}
  hideLoading();
};

  adminData.sort((a,b)=>a.site.localeCompare(b.site,'ko')).forEach(r=>{

window.addCustomVendor=function(site){
  const el=document.getElementById(`mc-new-vendor-${esc(site)}`);const val=el.value.trim();if(!val)return;
  const cfg=getSiteConfig(site);if(!cfg.vendors)cfg.vendors=[];if(!cfg.vendors.includes(val))cfg.vendors.push(val);
  el.value='';renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');
};
window.addCustomExpense=function(site){
  const el=document.getElementById(`mc-new-expense-${esc(site)}`);const val=el.value.trim();if(!val)return;
  const cfg=getSiteConfig(site);if(!cfg.expenses)cfg.expenses=[];if(!cfg.expenses.includes(val))cfg.expenses.push(val);
  el.value='';renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');
};
window.addMCWorker=function(site){
  const n=document.getElementById(`mc-wn-${esc(site)}`).value.trim();const t=document.getElementById(`mc-wt-${esc(site)}`).value;
  if(!n){showToast('이름을 입력해주세요',true);return;}
  const cfg=getSiteConfig(site);if(!cfg.workers)cfg.workers=[];cfg.workers.push({name:n,type:t});
  renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');
};
window.removeMCWorker=function(site,idx){const cfg=getSiteConfig(site);cfg.workers.splice(idx,1);renderMyConfig();document.getElementById('mc-'+esc(site)).classList.add('open');};
window.saveMCConfig=async function(site){
  showLoading('저장 중...');
  try{await saveConfig();hideLoading();showToast(`${site} 설정 저장 완료!`);}
  catch(e){hideLoading();showToast('저장 실패: '+e.message,true);}
};
</script>
</body>
