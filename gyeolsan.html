<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온정 F&B 결산</title>
<style>
:root{
  --bg:#f0f2f8;--bg2:#fff;--bg3:#f5f7ff;--bg4:#eceffe;
  --border:#dde1f0;--border2:#e8ebf8;
  --text1:#12163a;--text2:#5a6080;--text3:#8b92b8;--text4:#c0c6e0;
  --green:#0a8c68;--green-light:#e0faf3;--green-dark:#076b50;
  --red:#d93636;--amber:#b87800;--amber-light:#fff4e0;
  --blue:#2563eb;--blue-light:#eff4ff;
  --accent:#5b52e8;--accent-light:#f0efff;
  --shadow:0 4px 24px rgba(80,80,160,0.08);
  --shadow-lg:0 8px 40px rgba(80,80,160,0.15);
}
.dark{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--bg4:#2a2f45;
  --border:#2e3347;--border2:#363c56;
  --text1:#f0f2ff;--text2:#8b92b8;--text3:#5a6080;--text4:#3a4060;
  --green:#00d4a0;--green-light:rgba(0,212,160,0.12);--green-dark:#00a87e;
  --red:#ff5c5c;--amber:#ffb340;--amber-light:rgba(255,179,64,0.12);
  --blue:#4d8fff;--blue-light:rgba(77,143,255,0.12);
  --accent:#6c63ff;--accent-light:rgba(108,99,255,0.12);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);}

/* ── 로그인/대기 화면 ── */
.center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.login-logo{height:52px;object-fit:contain;margin-bottom:2rem;}
.screen-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.screen-sub{font-size:14px;color:var(--text2);margin-bottom:2rem;line-height:1.6;}
.btn-google{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;cursor:pointer;font-size:15px;font-weight:500;color:var(--text1);font-family:inherit;width:100%;max-width:320px;justify-content:center;box-shadow:var(--shadow);transition:transform 0.15s;}
.btn-google:hover{transform:translateY(-1px);}
.google-icon{width:20px;height:20px;}
.btn-logout{padding:10px 20px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit;}
.name-select{width:100%;max-width:320px;height:48px;padding:0 14px;font-size:16px;border:1px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;margin-bottom:12px;}
.pending-icon{width:64px;height:64px;border-radius:50%;background:var(--amber-light);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;}

/* ── 앱 레이아웃 ── */
.app{display:none;}
.app.active{display:block;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{height:28px;object-fit:contain;}
.topbar-name{font-size:13px;font-weight:600;color:var(--text1);}
.topbar-role{font-size:11px;color:var(--text2);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-icon{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.btn-icon:hover{background:var(--bg4);}

/* ── 매니저 탭바 (최소화) ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;scrollbar-width:none;position:sticky;top:50px;z-index:99;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:11px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

.content{padding:1rem;padding-bottom:6rem;max-width:640px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

/* ── 사업장/월 선택 바 ── */
.select-bar{display:flex;gap:8px;margin-bottom:16px;}
.select-bar select,.select-bar input{flex:1;height:42px;padding:0 12px;font-size:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;}
.select-bar select:focus,.select-bar input:focus{outline:none;border-color:var(--accent);}

/* ── 달력 ── */
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;}
.cal-month-label{font-size:17px;font-weight:700;color:var(--text1);}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.cal-nav button:hover{background:var(--bg4);}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;letter-spacing:0.03em;}
.cal-dow.sun{color:var(--red);}
.cal-dow.sat{color:var(--blue);}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 10px 12px;}
.cal-day{border-radius:10px;padding:7px 4px 6px;min-height:68px;cursor:pointer;transition:all 0.15s;position:relative;border:1.5px solid transparent;}
.cal-day:hover:not(.empty){background:var(--accent-light);border-color:var(--accent);}
.cal-day.empty{cursor:default;min-height:68px;}
.cal-day.today{border-color:var(--accent);}
.cal-day.today .cal-dn{color:var(--accent);}
.cal-day.selected{background:var(--accent);border-color:var(--accent);}
.cal-day.selected .cal-dn{color:#fff;}
.cal-day.selected .cal-sales,.cal-day.selected .cal-ratio{color:rgba(255,255,255,0.9);}
.cal-day.has-data{background:var(--bg3);}
.cal-day.has-data:hover{background:var(--accent-light);}
.cal-day.selected.has-data{background:var(--accent);}
.cal-dn{font-size:12px;font-weight:600;text-align:center;margin-bottom:4px;color:var(--text1);}
.cal-day.sun .cal-dn{color:var(--red);}
.cal-day.sat .cal-dn{color:var(--blue);}
.cal-day.selected .cal-dn{color:#fff !important;}
.cal-sales{font-size:10px;font-weight:700;text-align:center;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-ratio{font-size:10px;font-weight:700;text-align:center;margin-top:2px;padding:1px 4px;border-radius:4px;display:inline-block;width:100%;text-align:center;}
.cal-ratio.g{background:var(--green-light);color:var(--green);}
.cal-ratio.a{background:var(--amber-light);color:var(--amber);}
.cal-ratio.r{background:rgba(217,54,54,0.1);color:var(--red);}

/* ── 월 요약 스탯 ── */
.month-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:16px;}
.mstat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;box-shadow:var(--shadow);}
.mstat-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.03em;margin-bottom:6px;}
.mstat-val{font-size:18px;font-weight:700;color:var(--text1);line-height:1;}
.mstat-val.g{color:var(--green);}
.mstat-val.r{color:var(--red);}
.mstat-val.a{color:var(--amber);}

/* ── 슬라이드업 패널 ── */
.panel-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;backdrop-filter:blur(2px);}
.panel-backdrop.open{display:block;}
.slide-panel{position:fixed;left:0;right:0;bottom:0;z-index:201;background:var(--bg2);border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,0.2);transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.slide-panel.open{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;}
.panel-date{font-size:18px;font-weight:700;color:var(--text1);}
.panel-date-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.panel-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;}
.ptab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.panel-body{padding:16px 20px 24px;}
.psection{display:none;}.psection.active{display:block;}

/* ── 패널 내 입력 폼 ── */
.field-group{margin-bottom:14px;}
.field-label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.field-input{width:100%;height:44px;padding:0 12px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text1);font-family:inherit;-webkit-appearance:none;transition:border-color 0.15s;}
.field-input:focus{outline:none;border-color:var(--accent);background:var(--bg2);box-shadow:0 0 0 3px var(--accent-light);}
.field-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.meal-section{background:var(--bg3);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.meal-section-head{padding:12px 14px;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.03em;border-bottom:1px solid var(--border);}
.meal-row-inp{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border2);}
.meal-row-inp:last-child{border-bottom:none;}
.meal-row-label{font-size:13px;color:var(--text2);}
.meal-inp{width:110px;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;text-align:right;background:var(--bg2);color:var(--text1);font-family:inherit;}
.meal-inp:focus{outline:none;border-color:var(--accent);}
.meal-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.vendor-section{margin-bottom:10px;}
.vendor-section-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;}
.vendor-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;position:relative;}
.vendor-name{font-size:13px;color:var(--text1);flex:1;}
.vendor-inp{width:110px;height:34px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;text-align:right;background:var(--bg2);color:var(--text1);font-family:inherit;}
.vendor-inp:focus{outline:none;border-color:var(--accent);}
.vendor-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.note-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);cursor:pointer;}
.note-dot-empty{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;}

/* ── 일마감 요약 ── */
.day-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.dsum{background:var(--bg3);border-radius:10px;padding:10px 12px;text-align:center;}
.dsum-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.03em;margin-bottom:4px;}
.dsum-val{font-size:16px;font-weight:700;color:var(--text1);}
.dsum-val.g{color:var(--green);}
.dsum-val.r{color:var(--red);}
.dsum-val.a{color:var(--amber);}

/* ── 근태 폼 ── */
.worker-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.worker-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
.worker-name{font-size:14px;font-weight:600;color:var(--text1);}
.worker-type{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:600;}
.worker-type.full{background:var(--green-light);color:var(--green);}
.worker-type.part{background:var(--amber-light);color:var(--amber);}
.worker-inputs{padding:10px 14px;}
.worker-inp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.worker-inp-row:last-child{margin-bottom:0;}
.worker-inp-label{font-size:13px;color:var(--text2);}
.worker-inp-field{width:110px;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;text-align:right;background:var(--bg2);color:var(--text1);font-family:inherit;}
.worker-inp-field:focus{outline:none;border-color:var(--accent);}
.worker-inp-field::-webkit-inner-spin-button{-webkit-appearance:none;}

/* ── 공통 버튼 ── */
.btn-save{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:12px;transition:opacity 0.15s;}
.btn-save:hover{opacity:0.88;}
.btn-sm{padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;}
.btn-sm.danger{border-color:rgba(217,54,54,0.4);color:var(--red);background:rgba(217,54,54,0.06);}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;}
.badge-g{background:var(--green-light);color:var(--green);}
.badge-a{background:var(--amber-light);color:var(--amber);}
.badge-r{background:rgba(217,54,54,0.1);color:var(--red);}
.badge-gray{background:var(--bg4);color:var(--text3);}

/* ── 월말결산 / 주간 ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);}
.card-title{font-size:14px;font-weight:600;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:0.5px solid var(--border);}
.irow:last-child{border-bottom:none;}
.irow-label{font-size:13px;color:var(--text2);}
.irow-val{font-size:14px;font-weight:600;}
.irow-input{width:130px;height:38px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;text-align:right;background:var(--bg3);color:var(--text1);font-family:inherit;}
.irow-input:focus{outline:none;border-color:var(--accent);}

/* ── 경비 ── */
.exp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;}
.exp-row select{height:40px;font-size:13px;flex:0 0 120px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);padding:0 8px;-webkit-appearance:none;}
.exp-row input[type="text"]{height:40px;font-size:13px;flex:1;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);padding:0 10px;}
.exp-row input[type="number"]{height:40px;font-size:13px;flex:0 0 100px;text-align:right;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);padding:0 10px;}
.exp-row input::-webkit-inner-spin-button{-webkit-appearance:none;}

/* ── 설정 ── */
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.settings-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;transition:background 0.15s;}
.settings-head:hover{background:var(--bg3);}
.settings-name{font-size:14px;font-weight:600;}
.settings-info{font-size:12px;color:var(--text2);margin-top:3px;}
.settings-panel{display:none;padding:16px;border-top:1px solid var(--border);}
.settings-card.open .settings-panel{display:block;}
.chevron{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform 0.2s;}
.settings-card.open .chevron{transform:rotate(180deg);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:7px 14px;font-size:13px;border:1px solid var(--border);border-radius:99px;cursor:pointer;background:var(--bg3);color:var(--text2);font-weight:500;transition:all 0.15s;}
.chip.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600;}
.panel-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;margin-top:16px;letter-spacing:0.05em;text-transform:uppercase;}
.panel-label:first-child{margin-top:0;}
select,input[type="date"],input[type="month"],input[type="text"],input[type="number"]{-webkit-appearance:none;appearance:none;}

/* ── 관리자 ── */
.user-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:600;}
.user-email{font-size:12px;color:var(--text2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-site{font-size:12px;color:var(--text3);margin-top:2px;}
.user-actions{display:flex;gap:6px;flex-shrink:0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.field-label-std{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;}
.std-input{width:100%;height:44px;padding:0 12px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;}
.std-input:focus{outline:none;border-color:var(--accent);}

/* ── 노트 모달 ── */
.note-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.note-modal.open{display:flex;}
.note-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);}
.note-box-title{font-size:15px;font-weight:700;margin-bottom:12px;}
.note-textarea{width:100%;height:100px;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text1);resize:none;}
.note-textarea:focus{outline:none;border-color:var(--accent);}
.note-btns{display:flex;gap:8px;margin-top:12px;}
.note-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}

/* ── PC 좌우 분할 레이아웃 ── */
.cal-layout{display:flex;gap:16px;align-items:flex-start;}
.cal-left{flex:0 0 auto;width:420px;}
.cal-right{flex:1;min-width:0;position:sticky;top:100px;}
.pc-panel{background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
.pc-panel-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.pc-panel-date{font-size:18px;font-weight:700;color:var(--text1);}
.pc-panel-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.pc-panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;}
.pctab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:color 0.15s;}
.pctab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.pc-panel-body{padding:16px 20px 20px;max-height:calc(100vh - 220px);overflow-y:auto;}
.pc-panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;color:var(--text3);font-size:14px;gap:10px;}

/* ── 매출 입력 수식 카드 ── */
.meal-calc-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.meal-calc-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--accent-light);border-bottom:1px solid var(--border);}
.meal-calc-name{font-size:13px;font-weight:700;color:var(--accent);}
.meal-calc-result{font-size:14px;font-weight:700;color:var(--text1);}
.meal-calc-body{padding:12px 14px;}
.calc-row{display:flex;align-items:center;gap:8px;margin-bottom:0;}
.calc-input-wrap{flex:1;display:flex;flex-direction:column;gap:3px;}
.calc-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;}
.calc-inp{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:16px;font-weight:600;text-align:right;background:var(--bg2);color:var(--text1);font-family:inherit;}
.calc-inp:focus{outline:none;border-color:var(--accent);background:var(--bg2);box-shadow:0 0 0 3px var(--accent-light);}
.calc-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.calc-op{font-size:18px;font-weight:700;color:var(--text3);flex-shrink:0;margin-top:18px;}
.calc-eq{font-size:18px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:18px;}
.calc-result-wrap{flex:0 0 100px;display:flex;flex-direction:column;gap:3px;}
.calc-result-val{height:40px;border:none;border-radius:8px;padding:0 10px;font-size:16px;font-weight:700;text-align:right;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:flex-end;margin-top:21px;}

/* ── 매출 합계 바 ── */
.sales-total-bar{background:var(--accent);color:#fff;border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.sales-total-label{font-size:12px;font-weight:600;opacity:0.85;}
.sales-total-val{font-size:20px;font-weight:700;}

/* ── 식재료비 입력 ── */
.vendor-section-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.vendor-total-inline{font-size:13px;font-weight:700;color:var(--text1);}
.vendor-inp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;position:relative;}
.vendor-inp-name{font-size:13px;color:var(--text1);flex:1;font-weight:500;}
.vendor-inp-field{width:120px;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;font-weight:600;text-align:right;background:var(--bg2);color:var(--text1);font-family:inherit;}
.vendor-inp-field:focus{outline:none;border-color:var(--accent);}
.vendor-inp-field::-webkit-inner-spin-button{-webkit-appearance:none;}
.note-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);cursor:pointer;}
.note-dot-empty{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;}

/* ── 식재비 합계 + 비율 바 ── */
.vendor-summary-bar{border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-top:10px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;background:var(--bg3);}
.vsbar-item{text-align:center;}
.vsbar-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:4px;}
.vsbar-val{font-size:16px;font-weight:700;color:var(--text1);}
.vsbar-val.g{color:var(--green);}
.vsbar-val.r{color:var(--red);}
.vsbar-val.a{color:var(--amber);}

/* ── 로딩/토스트 ── */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(240,242,248,0.85);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.dark .loading-overlay{background:rgba(15,17,23,0.85);}
.loading-overlay.show{display:flex;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text2);font-weight:500;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text1);color:var(--bg2);border:1px solid var(--border);padding:13px 24px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;}
.toast.error{background:var(--red);color:#fff;border-color:var(--red);}

/* ── 반응형 ── */
@media(max-width:800px){
  .cal-layout{flex-direction:column;}
  .cal-left{width:100%;}
  .cal-right{display:none;} /* 모바일은 슬라이드업 패널 사용 */
  .slide-panel,.panel-backdrop{display:block;}
  .month-stats{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:801px){
  .slide-panel,.panel-backdrop{display:none !important;}
  .content{max-width:1100px;}
}
@media(max-width:480px){.two-col{grid-template-columns:1fr;}}
</style>

// ── 유틸 ──
function showLoading(msg){document.getElementById('loading-text').textContent=msg||'처리 중...';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
function showToast(msg,isError){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function esc(s){return s.replace(/[^a-zA-Z0-9가-힣]/g,'_');}
function fmtNum(n){return n?n.toLocaleString():'';}
function fmtW(n){return n>=10000?(n/10000).toFixed(0)+'만':fmtNum(n);}
function getDates(from,to){const d=[],c=new Date(from),e=new Date(to);while(c<=e){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}
function getDaysInMonth(month){const[y,m]=month.split('-').map(Number);const last=new Date(y,m,0).getDate();return getDates(`${month}-01`,`${month}-${String(last).padStart(2,'0')}`);}
function getWeeks(month){const dates=getDaysInMonth(month);const weeks=[];let w=[];dates.forEach(d=>{w.push(d);if(new Date(d).getDay()===0||d===dates[dates.length-1]){weeks.push([...w]);w=[];}});if(w.length)weeks.push(w);return weeks;}
function getSiteConfig(site){if(!SITE_CONFIG[site])SITE_CONFIG[site]={meals:['중식'],prices:{},extraVendors:[],expenses:[],workers:[]};return SITE_CONFIG[site];}

function getAllSites(){return MANAGERS.flatMap(m=>m.sites);}
function getManagerForSite(site){return MANAGERS.find(m=>m.sites.includes(site));}
function ratioColor(r){return r>53?'var(--red)':r>48?'var(--amber)':'var(--green)';}
function ratioClass(r){return r>53?'r':r>48?'a':'g';}

}

onAuthStateChanged(auth,async user=>{
  currentUser=user;
  if(!user){showScreen('login');hideLoading();return;}
  showLoading('불러오는 중...');
  await loadConfig();
  if(ADMIN_EMAILS.includes(user.email)){currentUserData={role:'admin',email:user.email};showAdminApp();hideLoading();return;}
  const snap=await getDoc(doc(db,'users',user.uid));
  if(!snap.exists()){
    showScreen('name');
    const sel=document.getElementById('name-select');sel.innerHTML='<option value="">매니저 이름 선택</option>';
    [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>sel.appendChild(new Option(m.name,m.name)));
    hideLoading();return;
  }
  const ud=snap.data();currentUserData=ud;
  if(ud.status==='pending'){showScreen('pending');hideLoading();return;}
  if(ud.status==='approved'){showManagerApp(ud);hideLoading();return;}
  hideLoading();
});

function showScreen(name){
  ['screen-login','screen-name','screen-pending'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('app-manager').classList.remove('active');

  else if(name==='name')document.getElementById('screen-name').style.display='block';

  showScreen('');document.getElementById('app-manager').classList.add('active');
  const sites=ud.sites||[];

  document.getElementById('topbar-role').textContent=sites.length===1?sites[0]:`사업장 ${sites.length}개`;

    const el=document.getElementById(id);if(!el)return;

  ['cal-month','wk-month','mo-month'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=thisMonth;});

}

window.onCalSiteChange=function(){

  ['wk-site','mo-site'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=site;});

window.loadCalendar=async function(){
  const site=document.getElementById('cal-site').value;
  const month=document.getElementById('cal-month').value;
  const wrap=document.getElementById('cal-wrap');
  if(!site||!month){wrap.innerHTML='<div class="empty-state">사업장과 월을 선택해주세요</div>';document.getElementById('month-stats').style.display='none';return;}
  showLoading('불러오는 중...');
  try{
    const cfg=getSiteConfig(site);
    const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
    const dates=getDaysInMonth(month);
    calMonthData={};
    for(const date of dates){
      const snap=await getDoc(doc(db,'daily',`${esc(site)}_${date}`));
      if(snap.exists())calMonthData[date]=snap.data();
    }
    renderCalendar(site,month,meals);
  }catch(e){showToast('불러오기 실패',true);console.error(e);}
  hideLoading();
};

function renderCalendar(site,month,meals){
  const [y,m]=month.split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay();
  const lastDate=new Date(y,m,0).getDate();
  const DOWS=['일','월','화','수','목','금','토'];

  document.getElementById('month-stats').style.display='grid';
  updateMonthStats(meals);

  let html=`<div class="cal-head">
    <div class="cal-month-label">${y}년 ${m}월</div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-dows">${DOWS.map((d,i)=>`<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('')}</div>
  <div class="cal-days">`;

  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=lastDate;d++){
    const dateStr=`${month}-${String(d).padStart(2,'0')}`;
    const dow=new Date(y,m-1,d).getDay();
    const isToday=dateStr===todayKST;
    const data=calMonthData[dateStr];
    let daySales=0,dayVendor=0;
    if(data){
      meals.forEach(meal=>{const md=data.meals?.[meal]||{};daySales+=(md.count||0)*(md.price||0);});
      Object.values(data.vendors||{}).forEach(v=>dayVendor+=v||0);
    }
    const ratio=daySales>0?Math.round(dayVendor/daySales*100):null;
    const cls=['cal-day',dow===0?'sun':dow===6?'sat':'',isToday?'today':'',data?'has-data':'',panelDate===dateStr?'selected':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="openPanel('${dateStr}','${site}')">
      <div class="cal-dn">${d}</div>
      ${daySales>0?`<div class="cal-sales">${fmtW(daySales)}</div>`:''}
      ${ratio!==null?`<div class="cal-ratio ${ratioClass(ratio)}">${ratio}%</div>`:''}
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('cal-wrap').innerHTML=html;
}

window.changeMonth=function(dir){
  const el=document.getElementById('cal-month');
  const [y,m]=el.value.split('-').map(Number);
  const newDate=new Date(y,m-1+dir,1);
  el.value=`${newDate.getFullYear()}-${String(newDate.getMonth()+1).padStart(2,'0')}`;
  onCalMonthChange();
};

// ── 슬라이드업 패널 / PC 패널 공통 ──
const isPC=()=>window.innerWidth>800;

window.openPanel=async function(date,site){
  panelDate=date;
  const d=new Date(date);
  const dayStr=DAYS[d.getDay()];
  const isSun=d.getDay()===0,isSat=d.getDay()===6;
  const titleColor=isSun?'var(--red)':isSat?'var(--blue)':'var(--text1)';
  const titleText=`${date.slice(5).replace('-','월 ')}일 (${dayStr})`;

  const data=calMonthData[date]||{};
  panelNotes=data.notes||{};

  // 달력 선택 표시
  document.querySelectorAll('.cal-day.selected').forEach(el=>el.classList.remove('selected'));
  const [y,m,day]=date.split('-').map(Number);
  const dow=new Date(y,m-1,1).getDay();
  const idx=dow+(day-1);
  const allDays=document.querySelectorAll('.cal-days .cal-day');
  if(allDays[idx])allDays[idx].classList.add('selected');

  if(isPC()){
    // PC: 우측 패널에 렌더
    document.getElementById('pc-panel-date').textContent=titleText;
    document.getElementById('pc-panel-date').style.color=titleColor;
    document.getElementById('pc-panel-sub').textContent=site;
    document.getElementById('pc-panel-tabs').style.display='flex';

    // 현재 활성 탭 확인
    const activeTab=document.querySelector('.pctab.active')?.getAttribute('onclick')?.match(/'(\w+)'/)?.[1]||'daily';
    if(activeTab==='daily'){renderPCDaily(site,date,data);}
    else{renderPCAttPanel(site,date);}
  } else {
    // 모바일: 슬라이드업
    document.getElementById('panel-date-title').textContent=titleText;
    document.getElementById('panel-date-title').style.color=titleColor;
    document.getElementById('panel-date-sub').textContent=site;
    document.getElementById('panel-backdrop').classList.add('open');
    document.getElementById('slide-panel').classList.add('open');
    switchPanelTab('daily');
    renderPanelDaily(site,date,data);
    renderPanelAtt(site,date);
  }
};

function renderPCDaily(site,date,data){
  if(!site||!date){document.getElementById('pc-panel-body').innerHTML='<div class="pc-panel-empty">날짜를 선택해주세요</div>';return;}
  const cfg=getSiteConfig(site);
  const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
  const vendors=getVendors(site);
  const prices=cfg.prices||{};

  let html='';

  // ── 끼니별 수식 카드 ──
  meals.forEach(meal=>{
    const cnt=data.meals?.[meal]?.count||'';
    const price=data.meals?.[meal]?.price||prices[meal]||'';
    const result=(parseFloat(cnt)||0)*(parseFloat(price)||0);
    html+=`<div class="meal-calc-card">
      <div class="meal-calc-head">
        <span class="meal-calc-name">${meal}</span>
        <span class="meal-calc-result" id="pc-result-${meal}">${result?fmtNum(result)+'원':'-'}</span>
      </div>
      <div class="meal-calc-body">
        <div class="calc-row">
          <div class="calc-input-wrap">
            <div class="calc-label">식수 (인)</div>
            <input class="calc-inp" type="number" id="pc-cnt-${meal}" value="${cnt}" placeholder="0" min="0" oninput="updatePCCalc('${site}','${date}')"/>
          </div>
          <div class="calc-op">×</div>
          <div class="calc-input-wrap">
            <div class="calc-label">식단가 (원)</div>
            <input class="calc-inp" type="number" id="pc-price-${meal}" value="${price}" placeholder="0" min="0" oninput="updatePCCalc('${site}','${date}')"/>
          </div>
          <div class="calc-eq">=</div>
          <div class="calc-result-wrap">
            <div class="calc-label" style="opacity:0;">결과</div>
            <div class="calc-result-val" id="pc-meal-val-${meal}">${result?fmtNum(result):'0'}</div>
          </div>
        </div>
      </div>
    </div>`;
  });

  // ── 매출 합계 바 ──
  let totalSales=0;
  meals.forEach(m=>{totalSales+=(parseFloat(data.meals?.[m]?.count)||0)*(parseFloat(data.meals?.[m]?.price||prices[m])||0);});
  html+=`<div class="sales-total-bar">
    <span class="sales-total-label">📈 총 매출</span>
    <span class="sales-total-val" id="pc-total-sales">${totalSales?fmtNum(totalSales)+'원':'0원'}</span>
  </div>`;

  // ── 식재료비 헤더 ──
  let totalVendor=0;
  vendors.forEach(v=>totalVendor+=parseFloat(data.vendors?.[v])||0);
  html+=`<div class="vendor-section-title">
    <span>🛒 식재료비</span>
    <span class="vendor-total-inline" id="pc-vendor-total">${totalVendor?fmtNum(totalVendor)+'원':'0원'}</span>
  </div>`;

  // ── 거래처 목록 ──
  vendors.forEach(v=>{
    const amt=data.vendors?.[v]||'';
    const note=panelNotes[v]||'';
    html+=`<div class="vendor-inp-row">
      <button onclick="removeVendorFromDaily('${site}','${date}','${v}')" style="flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;" title="제거">−</button>
      <span class="vendor-inp-name">${v}</span>
      <input class="vendor-inp-field" type="number" id="pc-v-${esc(v)}" value="${amt}" placeholder="0" min="0" oninput="updatePCCalc('${site}','${date}')"/>
      <button onclick="openNoteModal('${v}')" style="flex-shrink:0;width:30px;height:30px;border-radius:8px;border:1px solid ${note?'var(--accent)':'var(--border)'};background:${note?'var(--accent-light)':'var(--bg3)'};color:${note?'var(--accent)':'var(--text3)'};cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;" title="메모"><span id="pc-nd-${esc(v)}">${note?'📝':'💬'}</span></button>
    </div>`;
  });

  // ── 거래처 추가 버튼 ──
  html+=`<div style="margin-top:8px;">
    <button onclick="showVendorPicker('${site}','${date}')" style="width:100%;padding:9px;font-size:13px;font-weight:500;border:1.5px dashed var(--border);border-radius:10px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">+ 거래처 추가</button>
    <div id="vendor-picker" style="display:none;margin-top:8px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">기본 거래처</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
        ${DEFAULT_VENDORS.filter(v=>!vendors.includes(v)).map(v=>`<button onclick="addVendorToDaily('${site}','${date}','${v}')" style="padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:99px;background:var(--bg2);color:var(--text1);cursor:pointer;font-family:inherit;">${v}</button>`).join('')}
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;">직접 입력</div>
      <div style="display:flex;gap:6px;">
        <input type="text" id="custom-vendor-inp" placeholder="거래처명 입력" style="flex:1;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;background:var(--bg2);color:var(--text1);" onkeydown="if(event.key==='Enter')addCustomVendorToDaily('${site}','${date}')"/>
        <button onclick="addCustomVendorToDaily('${site}','${date}')" style="padding:0 14px;height:36px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">추가</button>
      </div>
    </div>
  </div>`;

  // ── 식재비 요약 바 ──
  const ratio=totalSales>0?Math.round(totalVendor/totalSales*100):null;
  const profit=totalSales-totalVendor;
  html+=`<div class="vendor-summary-bar" style="margin-top:10px;">

window.removeVendorFromDaily=function(site,date,vendor){
  const cfg=getSiteConfig(site);
  // 기본 거래처면 extraVendors에 제거목록으로 관리
  if(!cfg.removedVendors)cfg.removedVendors=[];
  if(DEFAULT_VENDORS.includes(vendor)){
    if(!cfg.removedVendors.includes(vendor))cfg.removedVendors.push(vendor);
  } else {
    cfg.extraVendors=(cfg.extraVendors||[]).filter(v=>v!==vendor);
  }
  const currentData=gatherCurrentInputs(site,date);
  renderPCDaily(site,date,currentData);
};

// getVendors 오버라이드 - removedVendors 반영
function getVendors(site){
  const cfg=getSiteConfig(site);
  const removed=cfg.removedVendors||[];
  return [...DEFAULT_VENDORS.filter(v=>!removed.includes(v)),...(cfg.extraVendors||[])];
}

function gatherCurrentInputs(site,date){
  const cfg=getSiteConfig(site);
  const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
  const vendors=getVendors(site);
  const mealsData={};const vendorsData={};
  meals.forEach(m=>{
    const cnt=parseFloat(document.getElementById(`pc-cnt-${m}`)?.value)||0;
    const price=parseFloat(document.getElementById(`pc-price-${m}`)?.value)||0;
    mealsData[m]={count:cnt,price};
  });
  vendors.forEach(v=>{vendorsData[v]=parseFloat(document.getElementById(`pc-v-${esc(v)}`)?.value)||0;});
  return {meals:mealsData,vendors:vendorsData,notes:panelNotes};
}

window.updatePCCalc=function(site,date){
  const cfg=getSiteConfig(site);
  const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];

  });

  const profit=tSales-tVendor;
  const ts=document.getElementById('pc-total-sales');if(ts)ts.textContent=fmtNum(tSales)+'원';
  const vt=document.getElementById('pc-vendor-total');if(vt)vt.textContent=tVendor?fmtNum(tVendor)+'원':'0원';

  const vp=document.getElementById('pc-vbar-profit');if(vp){vp.textContent=tSales?fmtW(profit)+'원':'-';vp.className='vsbar-val '+(profit<0?'r':'g');}
  const [y,m,day]=date.split('-').map(Number);const dow=new Date(y,m-1,1).getDay();
  const allDays=document.querySelectorAll('.cal-days .cal-day');const idx=dow+(day-1);
  if(allDays[idx]){

};

window.saveDailyPC=async function(site,date){
  showLoading('저장 중...');
  try{
    const cfg=getSiteConfig(site);
    const meals=cfg.meals&&cfg.meals.length?cfg.meals:['중식'];
    const vendors=getVendors(site);
    const mealsData={};let hasData=false;

      const cnt=parseFloat(document.getElementById(`pc-cnt-${m}`)?.value)||0;

      mealsData[m]={count:cnt,price};if(cnt||price)hasData=true;

    });

function updateMonthStats(meals){
  let tSales=0,tVendor=0,tDays=0;
  Object.values(calMonthData).forEach(data=>{
    let ds=0,dv=0;
    meals.forEach(m=>{const md=data.meals?.[m]||{};ds+=(md.count||0)*(md.price||0);});
    Object.values(data.vendors||{}).forEach(v=>dv+=v||0);
    if(ds>0){tSales+=ds;tVendor+=dv;tDays++;}
  });
  const tRatio=tSales>0?Math.round(tVendor/tSales*100):null;
  const tProfit=tSales-tVendor;
  document.getElementById('ms-sales').textContent=tSales?fmtW(tSales)+'원':'-';
  const msR=document.getElementById('ms-ratio');msR.textContent=tRatio!==null?tRatio+'%':'-';msR.className='mstat-val '+(tRatio!==null?ratioClass(tRatio):'');
  document.getElementById('ms-days').textContent=tDays?tDays+'일':'-';
  const msP=document.getElementById('ms-profit');msP.textContent=tSales?fmtW(tProfit)+'원':'-';msP.className='mstat-val '+(tProfit<0?'r':'g');
}

function expRowHTML(e,i,s,v,p){
  return `<div class="exp-row" id="exp-row-${i}">
    <select onchange="updateExpRow(${i},'account',this.value)">${EXPENSE_ACCOUNTS.map(a=>`<option value="${a}"${a===e.account?' selected':''}>${a}</option>`).join('')}</select>
    <input type="text" placeholder="세부내용" value="${e.detail||''}" onchange="updateExpRow(${i},'detail',this.value)"/>
    <input type="number" placeholder="0" value="${e.amount||''}" onchange="updateExpRow(${i},'amount',parseFloat(this.value)||0);updateMonthlyTotal(${s},${v},${p})"/>
    <button class="btn-sm danger" onclick="removeExpRow(${i})">삭제</button>
  </div>`;
}
window.addExpRow=function(s,v,p){
  _expRows.push({account:EXPENSE_ACCOUNTS[0],detail:'',amount:0});
  const i=_expRows.length-1;
  const div=document.createElement('div');
  div.className='exp-row';div.id=`exp-row-${i}`;
  div.innerHTML=`<select onchange="updateExpRow(${i},'account',this.value)">${EXPENSE_ACCOUNTS.map(a=>`<option>${a}</option>`).join('')}</select>
    <input type="text" placeholder="세부내용" onchange="updateExpRow(${i},'detail',this.value)"/>
    <input type="number" placeholder="0" onchange="updateExpRow(${i},'amount',parseFloat(this.value)||0);updateMonthlyTotal(${s},${v},${p})"/>
    <button class="btn-sm danger" onclick="removeExpRow(${i})">삭제</button>`;
  document.getElementById('exp-rows').appendChild(div);
};
window.updateExpRow=function(i,f,v){if(_expRows[i])_expRows[i][f]=v;};
window.removeExpRow=function(i){_expRows.splice(i,1);loadMonthly();};
window.updateMonthlyTotal=function(s,v,p){
  const tExp=_expRows.reduce((a,e)=>a+(e.amount||0),0);const op=s-v-p-tExp;const or=s>0?Math.round(op/s*100):0;
  const el=document.getElementById('exp-total');if(el)el.textContent=tExp.toLocaleString()+'원';
  const op2=document.getElementById('op-profit');if(op2){op2.textContent=op.toLocaleString()+'원';op2.style.color=or>0?'var(--green)':'var(--red)';}
  const or2=document.getElementById('op-ratio');if(or2){or2.textContent=or+'%';or2.style.color=or>0?'var(--green)':'var(--red)';}
};
window.saveExpenses=async function(site,month,s,v,p){
  showLoading('결산 제출 중...');
  try{
    const items=_expRows.filter(e=>e.amount>0||e.detail);
    const tExp=items.reduce((a,e)=>a+(e.amount||0),0);const op=s-v-p-tExp;
    await setDoc(doc(db,'expenses',`${esc(site)}_${month}`),{site,month,manager:currentUserData?.name||'',items,totalSales:s,totalVendor:v,totalPay:p,totalExpenses:tExp,operatingProfit:op,savedAt:new Date().toISOString()});
    showToast('결산 제출 완료!');
  }catch(e){showToast('저장 실패',true);}
  hideLoading();
};
window.downloadMonthlyExcel=function(site,month,s,v,p){
  const tExp=_expRows.reduce((a,e)=>a+(e.amount||0),0);const op=s-v-p-tExp;
  const rows=[['구분','세부내용','금액','구성비'],['매출','',s,'100%'],['식재료비','',v,s>0?Math.round(v/s*100)+'%':'-'],['인건비','',p,s>0?Math.round(p/s*100)+'%':'-']];
  _expRows.forEach(e=>{if(e.amount||e.detail)rows.push([e.account,e.detail||'',e.amount||0,'']);});
  rows.push(['경비합계','',tExp,s>0?Math.round(tExp/s*100)+'%':'-'],['영업이익','',op,s>0?Math.round(op/s*100)+'%':'-']);
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:16},{wch:20},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,`${month} 결산`);XLSX.writeFile(wb,`${site}_${month}_결산.xlsx`);showToast('엑셀 다운로드!');
};

    let html='';
    if(pending.length){html+=`<div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">승인 대기 (${pending.length}명)</div>`;html+=pending.map(u=>`<div class="user-card"><div class="user-info"><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div><div class="user-site">${(u.sites||[]).join(', ')||'사업장 없음'}</div></div><div class="user-actions"><button class="btn-sm" style="background:var(--green-light);color:var(--green);border-color:var(--green);" onclick="approveUser('${u.uid}')">승인</button><button class="btn-sm danger" onclick="rejectUser('${u.uid}')">거절</button></div></div>`).join('');}
    if(approved.length){html+=`<div style="font-size:13px;font-weight:600;color:var(--text2);margin:16px 0 8px;">승인된 계정 (${approved.length}명)</div>`;html+=approved.map(u=>`<div class="user-card"><div class="user-info"><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div><div class="user-site">${(u.sites||[]).join(', ')||'사업장 없음'}</div></div><div class="user-actions"><button class="btn-sm danger" onclick="revokeUser('${u.uid}')">취소</button></div></div>`).join('');}
    if(!pending.length&&!approved.length)html='<div class="empty-state">등록된 계정이 없어요</div>';
    document.getElementById('approval-list').innerHTML=html;
  }catch(e){showToast('불러오기 실패',true);}
}
window.approveUser=async function(uid){showLoading('승인 중...');try{await updateDoc(doc(db,'users',uid),{status:'approved'});hideLoading();showToast('승인 완료!');loadApproval();}catch(e){hideLoading();showToast('오류',true);}};
window.rejectUser=async function(uid){if(!confirm('거절하시겠어요?'))return;showLoading();try{await deleteDoc(doc(db,'users',uid));hideLoading();showToast('거절 완료');loadApproval();}catch(e){hideLoading();showToast('오류',true);}};
window.revokeUser=async function(uid){if(!confirm('승인 취소?'))return;showLoading();try{await updateDoc(doc(db,'users',uid),{status:'pending'});hideLoading();showToast('취소 완료');loadApproval();}catch(e){hideLoading();showToast('오류',true);}};

// ── 관리자 제출현황 ──
window.loadAdminStatus=async function(){
  const month=document.getElementById('adm-month').value;const mf=document.getElementById('adm-mgr-filter').value;
  if(!month)return;showLoading();
  try{
    const snap=await getDocs(query(collection(db,'expenses'),where('month','==',month)));
    adminData=[];snap.forEach(d=>adminData.push(d.data()));
    let sites=getAllSites();if(mf){const m=MANAGERS.find(x=>x.name===mf);sites=m?m.sites:[];}
    const recMap={};adminData.forEach(r=>recMap[r.site]=r);
    const submitted=sites.filter(s=>recMap[s]).length;
    let html=`<div style="padding:12px;font-size:13px;color:var(--text2);font-weight:500;">${month} · ${submitted}/${sites.length}개 사업장 제출</div>`;
    html+=`<table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="text-align:left;padding:8px 12px;background:var(--bg3);font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);">사업장</th>
      <th style="background:var(--bg3);font-size:11px;font-weight:600;color:var(--text2);padding:8px;border-bottom:1px solid var(--border);">매출</th>
      <th style="background:var(--bg3);font-size:11px;font-weight:600;color:var(--text2);padding:8px;border-bottom:1px solid var(--border);">식재비율</th>
      <th style="background:var(--bg3);font-size:11px;font-weight:600;color:var(--text2);padding:8px;border-bottom:1px solid var(--border);">영업이익률</th>
      <th style="background:var(--bg3);font-size:11px;font-weight:600;color:var(--text2);padding:8px;border-bottom:1px solid var(--border);">상태</th>
    </tr></thead><tbody>`;
    sites.forEach(site=>{
      const r=recMap[site];const mgr=getManagerForSite(site)?.name||'-';
      if(r){const vr=r.totalSales>0?Math.round(r.totalVendor/r.totalSales*100):0;const or=r.totalSales>0?Math.round(r.operatingProfit/r.totalSales*100):0;
        html+=`<tr><td style="padding:8px 12px;font-size:12px;border-bottom:0.5px solid var(--border);">${site}<br><span style="font-size:10px;color:var(--text3);">${mgr}</span></td><td style="text-align:right;padding:8px;font-size:12px;border-bottom:0.5px solid var(--border);">${r.totalSales.toLocaleString()}</td><td style="text-align:center;padding:8px;font-size:12px;border-bottom:0.5px solid var(--border);color:${ratioColor(vr)};">${vr}%</td><td style="text-align:center;padding:8px;font-size:12px;border-bottom:0.5px solid var(--border);color:${or>0?'var(--green)':'var(--red)'};">${or}%</td><td style="text-align:center;padding:8px;border-bottom:0.5px solid var(--border);"><span class="badge badge-g">완료</span></td></tr>`;
      }else{html+=`<tr><td style="padding:8px 12px;font-size:12px;border-bottom:0.5px solid var(--border);">${site}<br><span style="font-size:10px;color:var(--text3);">${mgr}</span></td><td colspan="3" style="text-align:center;font-size:12px;color:var(--text3);border-bottom:0.5px solid var(--border);padding:8px;">미제출</td><td style="text-align:center;padding:8px;border-bottom:0.5px solid var(--border);"><span class="badge badge-a">미제출</span></td></tr>`;}
    });
    html+=`</tbody></table>`;
    document.getElementById('status-grid').innerHTML=`<div style="border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--bg2);">${html}</div>`;
    document.getElementById('btn-excel').disabled=adminData.length===0;
  }catch(e){showToast('조회 실패',true);}
  hideLoading();
};
window.downloadExcel=function(){
  if(!adminData.length)return;
  const rows=[['사업장','담당','매출','식재료비','식재비율','인건비','인건비율','경비','영업이익','영업이익률']];
  adminData.sort((a,b)=>a.site.localeCompare(b.site,'ko')).forEach(r=>{const mgr=getManagerForSite(r.site)?.name||'-';rows.push([r.site,mgr,r.totalSales,r.totalVendor,r.totalSales>0?Math.round(r.totalVendor/r.totalSales*100)+'%':'-',r.totalPay,r.totalSales>0?Math.round(r.totalPay/r.totalSales*100)+'%':'-',r.totalExpenses||0,r.operatingProfit,r.totalSales>0?Math.round(r.operatingProfit/r.totalSales*100)+'%':'-']);});
  const ts=adminData.reduce((s,r)=>s+r.totalSales,0),tv=adminData.reduce((s,r)=>s+r.totalVendor,0),tp=adminData.reduce((s,r)=>s+r.totalPay,0),te=adminData.reduce((s,r)=>s+(r.totalExpenses||0),0),top=adminData.reduce((s,r)=>s+r.operatingProfit,0);
  rows.push(['합계','',ts,tv,ts>0?Math.round(tv/ts*100)+'%':'',tp,ts>0?Math.round(tp/ts*100)+'%':'',te,top,ts>0?Math.round(top/ts*100)+'%':'']);
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:18},{wch:12},{wch:14},{wch:12},{wch:9},{wch:12},{wch:9},{wch:12},{wch:12},{wch:9}];
  XLSX.utils.book_append_sheet(wb,ws,'결산취합');XLSX.writeFile(wb,`결산취합_${document.getElementById('adm-month').value}.xlsx`);showToast('엑셀 다운로드!');
};

// ── 관리자 사업장 설정 ──
function renderAdminConfig(){
  const sites=getAllSites().sort((a,b)=>a.localeCompare(b,'ko'));
  const addForm=`<div style="background:var(--bg2);border:1.5px dashed var(--border);border-radius:14px;padding:16px;margin-bottom:12px;">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;">+ 새 사업장 추가</div>
    <div style="margin-bottom:10px;"><label class="panel-label">사업장 이름</label><input type="text" id="ns-name" placeholder="사업장 이름" style="width:100%;height:44px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--bg3);color:var(--text1);" /></div>
    <div style="margin-bottom:10px;"><label class="panel-label">담당 매니저</label>
      <select id="ns-mgr" style="width:100%;height:44px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--bg3);color:var(--text1);">
        <option value="">기존 매니저 선택</option>${[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(m=>`<option>${m.name}</option>`).join('')}
      </select>
      <div style="margin-top:6px;display:flex;gap:8px;align-items:center;"><span style="font-size:12px;color:var(--text3);white-space:nowrap;">또는 새 매니저:</span><input type="text" id="ns-newmgr" placeholder="새 매니저 이름" style="flex:1;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;background:var(--bg3);color:var(--text1);" /></div>
    </div>
    <button onclick="addNewSite()" style="width:100%;padding:12px;font-size:14px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;">추가</button>
  </div>`;
  const sitesHtml=sites.map(site=>{
    const mgr=getManagerForSite(site)?.name||'미지정';const cfg=getSiteConfig(site);
    return `<div class="settings-card" id="ac-${esc(site)}">
      <div class="settings-head" onclick="toggleAC('${site}')">
        <div><div class="settings-name">${site}</div><div class="settings-info">담당: ${mgr}</div></div>
        <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="settings-panel">
        <div class="panel-label">담당 매니저</div>
        <select id="ac-mgr-${esc(site)}" style="width:100%;height:44px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--bg3);color:var(--text1);">${[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(m=>`<option value="${m.name}"${m.name===mgr?' selected':''}>${m.name}</option>`).join('')}</select>
        <div style="margin-top:6px;display:flex;gap:8px;align-items:center;"><span style="font-size:12px;color:var(--text3);white-space:nowrap;">새 매니저:</span><input type="text" id="ac-newmgr-${esc(site)}" placeholder="없으면 비워두세요" style="flex:1;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;background:var(--bg3);color:var(--text1);" /></div>
        <div class="panel-label">끼니</div>
        <div class="chip-row">${ALL_MEAL_TYPES.map(m=>`<div class="chip${(cfg.meals||[]).includes(m)?' on':''}" onclick="toggleChipA(this,'${site}','meals','${m}')">${m}</div>`).join('')}</div>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button onclick="saveAdminSite('${site}')" style="flex:1;padding:12px;font-size:14px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;">저장</button>
          <button onclick="deleteSite('${site}')" style="padding:0 14px;height:46px;font-size:13px;background:none;border:1px solid var(--red);border-radius:10px;cursor:pointer;color:var(--red);font-family:inherit;">삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('config-list').innerHTML=addForm+sitesHtml;
}
window.toggleAC=function(site){document.getElementById('ac-'+esc(site)).classList.toggle('open');};
window.toggleChipA=function(el,site,field,val){
  el.classList.toggle('on');const cfg=getSiteConfig(site);if(!cfg[field])cfg[field]=[];
  if(el.classList.contains('on')){if(!cfg[field].includes(val))cfg[field].push(val);}else cfg[field]=cfg[field].filter(x=>x!==val);
};
window.saveAdminSite=async function(site){
  showLoading('저장 중...');
  try{
    const sel=document.getElementById(`ac-mgr-${esc(site)}`).value;const newN=document.getElementById(`ac-newmgr-${esc(site)}`)?.value.trim();const finalMgr=newN||sel;
    if(newN&&!MANAGERS.find(m=>m.name===newN))MANAGERS.push({name:newN,sites:[]});
    MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==site);});
    const mgr=MANAGERS.find(m=>m.name===finalMgr);if(mgr&&!mgr.sites.includes(site))mgr.sites.push(site);
    await saveConfig();hideLoading();showToast(`${site} 저장!`);renderAdminConfig();
  }catch(e){hideLoading();showToast('저장 실패',true);}
};
window.deleteSite=async function(site){
  if(!confirm(`"${site}" 삭제?`))return;showLoading();
  try{MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==site);});delete SITE_CONFIG[site];await saveConfig();hideLoading();showToast('삭제 완료!');renderAdminConfig();}
  catch(e){hideLoading();showToast('실패',true);}
};
window.addNewSite=async function(){
  const name=document.getElementById('ns-name').value.trim();const ex=document.getElementById('ns-mgr').value;const newM=document.getElementById('ns-newmgr').value.trim();const mgr=newM||ex;
  if(!name){showToast('사업장 이름 입력해주세요',true);return;}if(getAllSites().includes(name)){showToast('이미 존재하는 사업장',true);return;}if(!mgr){showToast('담당 매니저를 선택하거나 입력해주세요',true);return;}
  showLoading();
  try{
    if(newM&&!MANAGERS.find(m=>m.name===newM))MANAGERS.push({name:newM,sites:[]});
    SITE_CONFIG[name]={meals:['중식'],prices:{},extraVendors:[],expenses:[],workers:[]};
    const m=MANAGERS.find(x=>x.name===mgr);if(m&&!m.sites.includes(name))m.sites.push(name);
    await saveConfig();hideLoading();showToast(`${name} 추가!`);
    document.getElementById('ns-name').value='';document.getElementById('ns-newmgr').value='';document.getElementById('ns-mgr').value='';
    renderAdminConfig();
  }catch(e){hideLoading();showToast('추가 실패',true);}
};
</script>
</body>
</html>
